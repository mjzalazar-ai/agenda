<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Mi Agenda">
<title>Mi Agenda</title>
<style>
:root {
  --bg:#f2f2f7; --card:#fff; --border:#e5e5ea;
  --t1:#1c1c1e; --t2:#3a3a3c; --t3:#8e8e93;
  --blue:#007aff; --red:#ff3b30; --green:#34c759;
  --r:12px; --safeB:env(safe-area-inset-bottom,0px); --safeT:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--t1);font-size:15px;}
#app{height:100%;display:flex;flex-direction:column;}
.hdr{padding:calc(var(--safeT) + 10px) 16px 8px;background:var(--bg);}
.hdr-top{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:10px;}
.hdr-day{font-size:24px;font-weight:700;}
.hdr-btns{display:flex;gap:6px;}
.hdr-btn{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:13px;font-weight:600;color:var(--blue);cursor:pointer;}
.search-wrap{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 12px;}
.search-wrap input{flex:1;border:none;background:none;font-size:14px;color:var(--t1);outline:none;}
.search-wrap input::placeholder{color:var(--t3);}
#views{flex:1;overflow:hidden;position:relative;}
.view{position:absolute;top:0;right:0;bottom:0;left:0;overflow-y:auto;display:none;-webkit-overflow-scrolling:touch;}
.view.active{display:block;}
.vcont{padding:10px 16px calc(90px + var(--safeB));}
.slbl{font-size:12px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 7px;}
.ti{display:flex;align-items:flex-start;gap:10px;background:var(--card);border-radius:var(--r);padding:12px;margin-bottom:8px;border:1px solid var(--border);}
.ti-chk{width:23px;height:23px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;}
.ti-chk.done{background:var(--green);border-color:var(--green);}
.ti-chk.done::after{content:'\2713';color:#fff;font-size:12px;font-weight:800;}
.ti-body{flex:1;min-width:0;}
.ti-title{font-size:15px;font-weight:500;line-height:1.3;word-break:break-word;}
.ti-title.struck{text-decoration:line-through;color:var(--t3);}
.ti-meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;}
.ti-note{font-size:12px;color:var(--t3);margin-top:4px;}
.ti-acts{display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
.ib{background:none;border:none;cursor:pointer;padding:5px 6px;border-radius:7px;font-size:15px;color:var(--t3);}
.ib:active{opacity:.5;}
.ib.red{color:var(--red);}
.tag{display:inline-flex;align-items:center;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;white-space:nowrap;}
.tag-venc{background:#fee2e2;color:#991b1b;}
.tag-alta{background:#fee2e2;color:#b91c1c;}
.tag-fecha{background:#f0f9ff;color:#0369a1;}
.tag-hora{background:#f0fdf4;color:#166534;}
.tag-quien{background:#f5f3ff;color:#6d28d9;}
.tag-recur{background:#fdf4ff;color:#86198f;font-size:10px;}
.agrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.acard{background:var(--card);border-radius:var(--r);padding:14px 8px 12px;text-align:center;border:1px solid var(--border);cursor:pointer;}
.acard:active{opacity:.7;}
.acard .ai{font-size:26px;margin-bottom:5px;}
.acard .al{font-size:12px;font-weight:600;color:var(--t2);}
.acard .ac{font-size:11px;color:var(--t3);margin-top:2px;min-height:15px;}
.acard .ac.has{color:var(--blue);font-weight:600;}
.area-hdr{display:flex;align-items:center;gap:12px;background:var(--card);border-radius:var(--r);padding:14px;border:1px solid var(--border);margin-bottom:14px;}
.area-hdr .ahi{font-size:34px;}
.area-hdr-txt{flex:1;}
.area-hdr-txt h2{font-size:19px;font-weight:700;}
.area-hdr-txt p{font-size:13px;color:var(--t3);margin-top:1px;}
.back-btn{display:flex;align-items:center;gap:3px;color:var(--blue);font-size:15px;font-weight:500;cursor:pointer;margin-bottom:10px;background:none;border:none;padding:3px 0;}
.ovb{background:#fee2e2;border:1px solid #fca5a5;border-radius:var(--r);padding:12px 14px;margin-bottom:8px;cursor:pointer;}
.ovb-t{font-weight:700;color:#991b1b;font-size:14px;}
.ovb-s{font-size:12px;color:#b91c1c;margin-top:2px;}
.empty{text-align:center;color:var(--t3);padding:40px 16px;}
.empty .ei{font-size:42px;margin-bottom:10px;}
.dgrp{margin-bottom:10px;}
.dgrp-lbl{font-size:13px;font-weight:700;color:var(--t3);margin-bottom:6px;padding-left:2px;}
#fab{position:fixed;bottom:calc(68px + var(--safeB));right:18px;width:54px;height:54px;border-radius:50%;background:var(--blue);color:#fff;font-size:26px;border:none;cursor:pointer;box-shadow:0 4px 14px rgba(0,122,255,.45);display:flex;align-items:center;justify-content:center;z-index:100;}
#fab:active{transform:scale(.93);}
#nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.94);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding-bottom:var(--safeB);display:flex;z-index:50;}
.ntab{flex:1;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;background:none;border:none;}
.ntab .ni{font-size:22px;}
.ntab .nl{font-size:10px;font-weight:500;color:var(--t3);}
.ntab.active .nl{color:var(--blue);}
#moverlay{position:fixed;top:0;right:0;bottom:0;left:0;background:rgba(0,0,0,.4);z-index:200;display:none;}
#moverlay.on{display:block;}
#msheet{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:20px 20px 0 0;padding:14px 16px calc(14px + var(--safeB));max-height:93vh;overflow-y:auto;z-index:201;-webkit-transform:translateY(100%);transform:translateY(100%);-webkit-transition:-webkit-transform .28s;transition:transform .28s;}
#msheet.on{-webkit-transform:none;transform:none;}
.shandle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px;}
.stitle{font-size:18px;font-weight:700;margin-bottom:14px;}
.sfield{margin-bottom:13px;}
.sfield label{display:block;font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;}
.sfield input,.sfield select,.sfield textarea{width:100%;font-size:15px;padding:10px 12px;border:1px solid var(--border);border-radius:10px;background:var(--bg);color:var(--t1);outline:none;-webkit-appearance:none;}
.sfield input:focus,.sfield select:focus,.sfield textarea:focus{border-color:var(--blue);background:var(--card);}
.sfield textarea{height:62px;resize:none;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.sbtns{display:flex;gap:10px;margin-top:6px;}
.sbtn{flex:1;padding:13px;border-radius:12px;border:none;font-size:16px;font-weight:600;cursor:pointer;}
.sbtn.p{background:var(--blue);color:#fff;}
.sbtn.s{background:var(--bg);color:var(--t3);border:1px solid var(--border);}
.sbtn:active{opacity:.8;}
.set-row{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:8px;cursor:pointer;}
.set-row-l{font-size:15px;}
.set-row-r{color:var(--t3);font-size:13px;}
#toast{position:fixed;bottom:calc(80px + var(--safeB));left:50%;-webkit-transform:translateX(-50%);transform:translateX(-50%);background:rgba(28,28,30,.92);color:#fff;font-size:13px;padding:8px 18px;border-radius:20px;z-index:400;opacity:0;-webkit-transition:opacity .2s;transition:opacity .2s;pointer-events:none;white-space:nowrap;}
#toast.on{opacity:1;}
@media(min-width:480px){
  .agrid{grid-template-columns:repeat(4,1fr);}
  #msheet{max-width:480px;left:50%;right:auto;-webkit-transform:translateX(-50%) translateY(100%);transform:translateX(-50%) translateY(100%);border-radius:20px;bottom:20px;}
  #msheet.on{-webkit-transform:translateX(-50%) translateY(0);transform:translateX(-50%) translateY(0);}
}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="hdr-top">
      <div class="hdr-day" id="hdrDay">Cargando...</div>
      <div class="hdr-btns">
        <button class="hdr-btn" onclick="document.getElementById('imgInput').click()">&#128247;</button>
        <button class="hdr-btn" onclick="setTab('config')">&#9881;</button>
      </div>
      <input type="file" id="imgInput" accept="image/*" style="display:none" onchange="procesarImagen(event)">
    </div>
    <div class="search-wrap">
      <span style="color:var(--t3);font-size:14px">&#128269;</span>
      <input type="text" id="search" placeholder="Buscar en todo..." oninput="onSearch()">
      <button class="ib" id="clrSearch" style="display:none;color:var(--t3)" onclick="clearSearch()">&#10005;</button>
    </div>
  </div>
  <div id="views">
    <div class="view active" id="view-hoy"><div class="vcont" id="c-hoy"></div></div>
    <div class="view" id="view-areas"><div class="vcont" id="c-areas"></div></div>
    <div class="view" id="view-prox"><div class="vcont" id="c-prox"></div></div>
    <div class="view" id="view-config"><div class="vcont" id="c-config"></div></div>
    <div class="view" id="view-search"><div class="vcont" id="c-search"></div></div>
  </div>
  <button id="fab" onclick="abrirModal()">+</button>
  <nav id="nav">
    <button class="ntab active" data-t="hoy" onclick="setTab('hoy')">
      <span class="ni">&#9728;&#65039;</span><span class="nl">Hoy</span>
    </button>
    <button class="ntab" data-t="areas" onclick="setTab('areas')">
      <span class="ni">&#128194;</span><span class="nl">&#193;reas</span>
    </button>
    <button class="ntab" data-t="prox" onclick="setTab('prox')">
      <span class="ni">&#128197;</span><span class="nl">Pr&#243;ximas</span>
    </button>
  </nav>
  <div id="moverlay" onclick="cerrarModal()"></div>
  <div id="msheet"><div class="shandle"></div><div id="mcon"></div></div>
  <div id="toast"></div>
</div>
<script>
var SK = 'miagenda_v2';
var AREAS = [
  {id:'colegio',   i:'🏫', l:'Colegio',    bg:'#e0f2fe', fg:'#0369a1'},
  {id:'hogar',     i:'🏠', l:'Hogar',      bg:'#fef3c7', fg:'#92400e'},
  {id:'compras',   i:'🛒', l:'Compras',    bg:'#dcfce7', fg:'#166534'},
  {id:'salud',     i:'🩺', l:'Salud',      bg:'#fee2e2', fg:'#991b1b'},
  {id:'maestria',  i:'📚', l:'Maestría',   bg:'#ede9fe', fg:'#5b21b6'},
  {id:'ingles',    i:'🗣️', l:'Inglés',     bg:'#dbeafe', fg:'#1e40af'},
  {id:'pagos',     i:'💰', l:'Pagos',      bg:'#fef9c3', fg:'#854d0e'},
  {id:'remedios',  i:'💊', l:'Remedios',   bg:'#fdf4ff', fg:'#86198f'},
  {id:'pendientes',i:'📋', l:'Pendientes', bg:'#f1f5f9', fg:'#475569'},
  {id:'tramites',  i:'📝', l:'Trámites',   bg:'#fff7ed', fg:'#c2410c'},
  {id:'eventos',   i:'📅', l:'Eventos',    bg:'#faf5ff', fg:'#7e22ce'},
  {id:'gimnasio',  i:'🏋️', l:'Gimnasio',  bg:'#f0fdf4', fg:'#15803d'}
];
var AM = {};
for (var _i = 0; _i < AREAS.length; _i++) { AM[AREAS[_i].id] = AREAS[_i]; }

function cargar() {
  try { var d = localStorage.getItem(SK); if (d) return JSON.parse(d); } catch(e) {}
  return {items:[], nextId:1};
}
function guardar() { try { localStorage.setItem(SK, JSON.stringify({items:items, nextId:nextId})); } catch(e) {} }

var _data = cargar();
var items = _data.items;
var nextId = _data.nextId;
var editId = null, tabAct = 'hoy', areaAct = null, searchQ = '', vencOpen = false, pendingFile = null;

function hoy() { return new Date().toISOString().slice(0,10); }
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtF(f) {
  if (!f) return '';
  var t = hoy();
  var tom = new Date(); tom.setDate(tom.getDate()+1);
  var ts = tom.toISOString().slice(0,10);
  if (f === t) return 'Hoy';
  if (f === ts) return 'Mañana';
  var d = new Date(f + 'T12:00:00');
  var ds = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  var parts = f.split('-');
  var y = parts[0], m = parts[1], dd = parts[2];
  var diff = Math.round((d - new Date()) / 86400000);
  if (diff > -8 && diff < 15) return ds[d.getDay()] + ' ' + dd + '/' + m;
  return dd + '/' + m + '/' + String(y).slice(2);
}

function isVenc(t) { return t.fecha && t.fecha < hoy() && t.estado !== 'completado'; }
function diasEnMes(y, m) { return new Date(y, m+1, 0).getDate(); }

function avanzar(t) {
  var f = new Date(t.fecha + 'T00:00:00');
  if (t.recur === 'diaria') f.setDate(f.getDate()+1);
  else if (t.recur === 'semanal') f.setDate(f.getDate()+7);
  else if (t.recur === 'mensual') {
    f.setMonth(f.getMonth()+1);
    if (t.dia) f.setDate(Math.min(t.dia, diasEnMes(f.getFullYear(), f.getMonth())));
  }
  else if (t.recur === 'anual') f.setFullYear(f.getFullYear()+1);
  t.fecha = f.toISOString().slice(0,10);
  t.estado = 'pendiente';
}

function atag(id) {
  var a = AM[id]; if (!a) return '';
  return '<span class="tag" style="background:' + a.bg + ';color:' + a.fg + '">' + a.i + ' ' + a.l + '</span>';
}

function tiHtml(t, showArea) {
  if (showArea === undefined) showArea = true;
  var done = t.estado === 'completado';
  var venc = isVenc(t);
  var h = '<div class="ti">';
  h += '<div class="ti-chk' + (done ? ' done' : '') + '" onclick="toggleDone(' + t.id + ')"></div>';
  h += '<div class="ti-body">';
  h += '<div class="ti-title' + (done ? ' struck' : '') + '">' + esc(t.titulo) + '</div>';
  h += '<div class="ti-meta">';
  if (showArea) h += atag(t.area);
  if (t.prio === 'alta') h += '<span class="tag tag-alta">❗Alta</span>';
  if (t.hora) h += '<span class="tag tag-hora">⏰ ' + t.hora + '</span>';
  if (t.fecha && !done) h += '<span class="tag ' + (venc ? 'tag-venc' : 'tag-fecha') + '">' + (venc ? '⚠️ ' : '') + fmtF(t.fecha) + '</span>';
  if (t.quien) h += '<span class="tag tag-quien">👤 ' + esc(t.quien) + '</span>';
  if (t.recur) h += '<span class="tag tag-recur">↻ ' + t.recur + '</span>';
  h += '</div>';
  if (t.detalle) h += '<div class="ti-note">' + esc(t.detalle) + '</div>';
  h += '</div>';
  h += '<div class="ti-acts">';
  h += '<button class="ib" onclick="abrirEditar(' + t.id + ')" title="Editar">✎</button>';
  h += '<button class="ib red" onclick="pedirEliminar(' + t.id + ')" title="Eliminar">✕</button>';
  h += '</div></div>';
  return h;
}

function fmtHoy() {
  var d = new Date();
  var ds = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  var ms = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return ds[d.getDay()] + ' ' + d.getDate() + ' de ' + ms[d.getMonth()];
}

function setTab(tab) {
  if (tab !== 'areas') areaAct = null;
  tabAct = tab;
  var tabs = document.querySelectorAll('.ntab');
  for (var i = 0; i < tabs.length; i++) {
    if (tabs[i].dataset.t === tab) tabs[i].classList.add('active');
    else tabs[i].classList.remove('active');
  }
  var views = document.querySelectorAll('.view');
  for (var i = 0; i < views.length; i++) {
    if (views[i].id === 'view-' + tab) views[i].classList.add('active');
    else views[i].classList.remove('active');
  }
  var titles = {hoy:fmtHoy(), areas:'Mis Áreas', prox:'Próximas', config:'Ajustes', search:'Búsqueda'};
  document.getElementById('hdrDay').textContent = titles[tab] || tab;
  renderTab(tab);
}

function renderTab(tab) {
  if (tab === 'hoy') rHoy();
  else if (tab === 'areas') { if (areaAct) rAreaDet(); else rAreas(); }
  else if (tab === 'prox') rProx();
  else if (tab === 'config') rConfig();
  else if (tab === 'search') rSearch();
}

function rHoy() {
  var h = hoy();
  var hoyT = items.filter(function(t){ return t.fecha === h && t.estado !== 'completado'; });
  hoyT.sort(function(a,b){ return (a.hora||'23:59') < (b.hora||'23:59') ? -1 : 1; });
  var venc = items.filter(function(t){ return isVenc(t); });
  var altas = items.filter(function(t){ return !t.fecha && t.estado === 'pendiente' && t.prio === 'alta'; }).slice(0,6);
  var manT = new Date(); manT.setDate(manT.getDate()+1);
  var manS = manT.toISOString().slice(0,10);
  var man = items.filter(function(t){ return t.fecha === manS && t.estado !== 'completado'; });
  man.sort(function(a,b){ return (a.hora||'23:59') < (b.hora||'23:59') ? -1 : 1; });

  var h2 = '';

  if (venc.length) {
    h2 += '<div class="ovb" onclick="toggleVenc()">';
    h2 += '<div class="ovb-t">⚠️ ' + venc.length + ' vencida' + (venc.length > 1 ? 's' : '') + '</div>';
    h2 += '<div class="ovb-s" id="vencSub">' + (vencOpen ? 'Tocá para ocultar' : 'Tocá para ver') + '</div>';
    h2 += '</div>';
    h2 += '<div id="vencList" style="display:' + (vencOpen ? 'block' : 'none') + '">';
    for (var i = 0; i < venc.length; i++) h2 += tiHtml(venc[i]);
    h2 += '</div>';
  }

  if (!hoyT.length && !venc.length && !altas.length) {
    h2 += '<div class="empty"><div class="ei">🌟</div>¡Todo al día! No hay tareas para hoy.</div>';
  } else {
    var rem = hoyT.filter(function(t){ return t.area === 'remedios'; });
    var resto = hoyT.filter(function(t){ return t.area !== 'remedios'; });
    if (rem.length) {
      h2 += '<div class="slbl">💊 Remedios</div>';
      for (var i = 0; i < rem.length; i++) h2 += tiHtml(rem[i], false);
    }
    if (resto.length) {
      h2 += '<div class="slbl">📋 Para hoy (' + resto.length + ')</div>';
      for (var i = 0; i < resto.length; i++) h2 += tiHtml(resto[i]);
    }
    if (altas.length) {
      h2 += '<div class="slbl">❗ Alta prioridad sin fecha</div>';
      for (var i = 0; i < altas.length; i++) h2 += tiHtml(altas[i]);
    }
  }

  if (man.length) {
    h2 += '<div class="slbl">Mañana (' + man.length + ')</div>';
    for (var i = 0; i < man.length; i++) h2 += tiHtml(man[i]);
  }

  var pendByArea = [];
  for (var i = 0; i < AREAS.length; i++) {
    var a = AREAS[i];
    var n = items.filter(function(t){ return t.area === a.id && t.estado !== 'completado'; }).length;
    if (n > 0) pendByArea.push({a:a, n:n});
  }
  if (pendByArea.length) {
    h2 += '<div class="slbl">Resumen por área</div><div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:8px">';
    for (var i = 0; i < pendByArea.length; i++) {
      var pa = pendByArea[i];
      h2 += '<span class="tag" style="background:' + pa.a.bg + ';color:' + pa.a.fg + ';cursor:pointer;padding:4px 10px;font-size:12px" onclick="irArea(\'' + pa.a.id + '\')">' + pa.a.i + ' ' + pa.a.l + ' <b>' + pa.n + '</b></span>';
    }
    h2 += '</div>';
  }

  document.getElementById('c-hoy').innerHTML = h2 || '<div class="empty"><div class="ei">🌟</div>Todo al día.</div>';
}

function toggleVenc() {
  vencOpen = !vencOpen;
  var el = document.getElementById('vencList');
  var sub = document.getElementById('vencSub');
  if (el) el.style.display = vencOpen ? 'block' : 'none';
  if (sub) sub.textContent = vencOpen ? 'Tocá para ocultar' : 'Tocá para ver';
}

function rAreas() {
  var h = '<div class="agrid">';
  for (var i = 0; i < AREAS.length; i++) {
    var a = AREAS[i];
    var n = items.filter(function(t){ return t.area === a.id && t.estado !== 'completado'; }).length;
    h += '<div class="acard" onclick="irArea(\'' + a.id + '\')">'
    h += '<div class="ai">' + a.i + '</div>';
    h += '<div class="al">' + a.l + '</div>';
    h += '<div class="ac' + (n ? ' has' : '') + '">' + (n ? n + ' pend.' : ' ') + '</div>';
    h += '</div>';
  }
  h += '</div>';
  document.getElementById('c-areas').innerHTML = h;
}

function irArea(id) {
  areaAct = id;
  if (tabAct !== 'areas') setTab('areas');
  else { rAreaDet(); document.getElementById('hdrDay').textContent = (AM[id] && AM[id].l) || id; }
}

function rAreaDet() {
  var a = AM[areaAct]; if (!a) return;
  var pend = items.filter(function(t){ return t.area === areaAct && t.estado !== 'completado'; });
  pend.sort(function(x,y){
    if (x.fecha && y.fecha) return x.fecha < y.fecha ? -1 : 1;
    if (x.fecha) return -1; if (y.fecha) return 1; return 0;
  });
  var done = items.filter(function(t){ return t.area === areaAct && t.estado === 'completado'; });
  var h = '<button class="back-btn" onclick="volverAreas()">&larr; Áreas</button>';
  h += '<div class="area-hdr"><div class="ahi">' + a.i + '</div>';
  h += '<div class="area-hdr-txt"><h2>' + a.l + '</h2><p>' + pend.length + ' pendiente' + (pend.length !== 1 ? 's' : '') + '</p></div>';
  h += '<button class="hdr-btn" onclick="abrirModalArea(\'' + areaAct + '\')">+ Agregar</button></div>';
  if (!pend.length && !done.length) {
    h += '<div class="empty"><div class="ei">' + a.i + '</div>No hay tareas en ' + a.l + '.</div>';
  }
  for (var i = 0; i < pend.length; i++) h += tiHtml(pend[i], false);
  if (done.length) {
    h += '<div class="slbl">Completados (' + done.length + ')</div>';
    for (var i = 0; i < done.length; i++) h += tiHtml(done[i], false);
  }
  document.getElementById('c-areas').innerHTML = h;
  document.getElementById('hdrDay').textContent = a.l;
}

function volverAreas() { areaAct = null; rAreas(); document.getElementById('hdrDay').textContent = 'Mis Áreas'; }

function rProx() {
  var grupos = [];
  for (var i = 1; i <= 21; i++) {
    var d = new Date(); d.setDate(d.getDate()+i);
    var ds = d.toISOString().slice(0,10);
    var its = items.filter(function(t){ return t.fecha === ds && t.estado !== 'completado'; });
    if (its.length) grupos.push({ds:ds, its:its});
  }
  if (!grupos.length) {
    document.getElementById('c-prox').innerHTML = '<div class="empty"><div class="ei">📅</div>Sin tareas en los próximos 21 días.</div>';
    return;
  }
  var dN = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  var mN = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  var h = '';
  for (var i = 0; i < grupos.length; i++) {
    var g = grupos[i];
    var d = new Date(g.ds + 'T12:00:00');
    h += '<div class="dgrp"><div class="dgrp-lbl">' + dN[d.getDay()] + ' ' + d.getDate() + ' ' + mN[d.getMonth()] + '</div>';
    for (var j = 0; j < g.its.length; j++) h += tiHtml(g.its[j]);
    h += '</div>';
  }
  document.getElementById('c-prox').innerHTML = h;
}

function rConfig() {
  var tot = items.length;
  var comp = items.filter(function(t){ return t.estado === 'completado'; }).length;
  var h = '<div class="slbl">Datos</div>';
  h += '<div class="set-row"><span class="set-row-l">📊 Total de tareas</span><span class="set-row-r">' + tot + '</span></div>';
  h += '<div class="set-row"><span class="set-row-l">✅ Completadas</span><span class="set-row-r">' + comp + '</span></div>';
  h += '<div class="set-row"><span class="set-row-l">📋 Pendientes</span><span class="set-row-r">' + (tot-comp) + '</span></div>';
  h += '<div class="slbl">Copia de seguridad</div>';
  h += '<div class="set-row" onclick="exportar()"><span class="set-row-l">⬇️ Exportar JSON</span><span class="set-row-r">›</span></div>';
  h += '<div class="set-row" onclick="document.getElementById(\'fInput\').click()"><span class="set-row-l">⬆️ Importar JSON</span><span class="set-row-r">›</span></div>';

  h += '<div class="slbl">Extracción desde imagen (IA)</div>';

  var keyOk = localStorage.getItem('anthropic_key') ? '✓ Configurada' : 'Sin configurar';
  h += '<div class="set-row" onclick="editarApiKey()"><span class="set-row-l">🔑 Anthropic API Key</span><span class="set-row-r">' + keyOk + '</span></div>';
  h += '<div class="slbl">Agregar rápido por área</div>';
  for (var i = 0; i < AREAS.length; i++) {
    var a = AREAS[i];
    h += '<div class="set-row" onclick="abrirModalArea(\'' + a.id + '\')"><span class="set-row-l">' + a.i + ' ' + a.l + '</span><span class="set-row-r">+ Agregar</span></div>';
  }
  h += '<div style="height:10px"></div>';
  document.getElementById('c-config').innerHTML = h;
}

function onSearch() {
  var q = document.getElementById('search').value.trim().toLowerCase();
  searchQ = q;
  document.getElementById('clrSearch').style.display = q ? '' : 'none';
  if (q) {
    var views = document.querySelectorAll('.view');
    for (var i = 0; i < views.length; i++) {
      if (views[i].id === 'view-search') views[i].classList.add('active');
      else views[i].classList.remove('active');
    }
    var tabs = document.querySelectorAll('.ntab');
    for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
    document.getElementById('hdrDay').textContent = 'Búsqueda';
    rSearch();
  } else {
    setTab(tabAct === 'search' ? 'hoy' : tabAct);
  }
}

function clearSearch() {
  document.getElementById('search').value = '';
  searchQ = '';
  document.getElementById('clrSearch').style.display = 'none';
  setTab('hoy');
}

function rSearch() {
  var q = searchQ;
  if (!q) { document.getElementById('c-search').innerHTML = ''; return; }
  var res = items.filter(function(t){
    return t.titulo.toLowerCase().indexOf(q) !== -1 ||
      (t.detalle||'').toLowerCase().indexOf(q) !== -1 ||
      (t.quien||'').toLowerCase().indexOf(q) !== -1 ||
      ((AM[t.area] && AM[t.area].l) || '').toLowerCase().indexOf(q) !== -1;
  });
  var h = '<div class="slbl">' + res.length + ' resultado' + (res.length !== 1 ? 's' : '') + ' para "' + esc(q) + '"</div>';
  if (res.length) { for (var i = 0; i < res.length; i++) h += tiHtml(res[i]); }
  else h += '<div class="empty">No se encontró nada.</div>';
  document.getElementById('c-search').innerHTML = h;
}

function toggleDone(id) {
  var t = null;
  for (var i = 0; i < items.length; i++) if (items[i].id === id) { t = items[i]; break; }
  if (!t) return;
  if (t.recur && t.estado !== 'completado') { avanzar(t); toast('↻ Ciclo avanzado'); }
  else { t.estado = t.estado === 'completado' ? 'pendiente' : 'completado'; }
  guardar(); renderTab(tabAct);
}

function pedirEliminar(id) {
  var t = null;
  for (var i = 0; i < items.length; i++) if (items[i].id === id) { t = items[i]; break; }
  if (!t) return;
  document.getElementById('mcon').innerHTML =
    '<div class="stitle">¿Eliminar tarea?</div>' +
    '<p style="color:var(--t3);font-size:14px;margin-bottom:16px">"' + esc(t.titulo) + '" se eliminará para siempre.</p>' +
    '<div class="sbtns">' +
    '<button class="sbtn s" onclick="cerrarModal()">Cancelar</button>' +
    '<button class="sbtn" style="background:var(--red);color:#fff" onclick="eliminar(' + id + ')">Eliminar</button>' +
    '</div>';
  showSheet();
}

function eliminar(id) {
  items = items.filter(function(x){ return x.id !== id; });
  guardar(); cerrarModal(); renderTab(tabAct); toast('🗑 Eliminado');
}

function abrirModal(def) {
  if (!def) def = '';
  editId = null;
  mostrarForm({titulo:'',detalle:'',area:def||areaAct||'pendientes',estado:'pendiente',fecha:'',hora:'',recur:'',dia:'',quien:'',prio:'normal'});
}

function abrirModalArea(id) {
  cerrarModal();
  setTimeout(function(){ abrirModal(id); }, 60);
}

function abrirEditar(id) {
  editId = id;
  var t = null;
  for (var i = 0; i < items.length; i++) if (items[i].id === id) { t = items[i]; break; }
  if (!t) return;
  var copy = {};
  for (var k in t) copy[k] = t[k];
  copy.dia = t.dia || '';
  copy.recur = t.recur || '';
  mostrarForm(copy);
}

  h += '<option value="baja"' + (f.prio === 'baja' ? ' selected' : '') + '>Baja</option>';
  h += '</select></div></div>';
  h += '<div class="frow">';

  h += '<option value="semanal"' + (f.recur === 'semanal' ? ' selected' : '') + '>Semanal</option>';
  h += '<option value="mensual"' + (f.recur === 'mensual' ? ' selected' : '') + '>Mensual</option>';

  h += '</select></div>';

    h += '<div class="sfield"><label>Estado</label><select id="fE">';

    h += '<option value="en-curso"' + (f.estado === 'en-curso' ? ' selected' : '') + '>En curso</option>';
    h += '<option value="completado"' + (f.estado === 'completado' ? ' selected' : '') + '>Completado</option>';
    h += '</select></div>';
  }
  h += '<div class="sbtns"><button class="sbtn s" onclick="cerrarModal()">Cancelar</button><button class="sbtn p" onclick="guardarForm()">Guardar</button></div>';
  document.getElementById('mcon').innerHTML = h;
  showSheet();
  setTimeout(function(){ var el = document.getElementById('fT'); if (el) el.focus(); }, 250);
}

function onRecur() {
  var fR = document.getElementById('fR');
  var w = document.getElementById('fDW');
  if (w && fR) w.style.display = fR.value === 'mensual' ? 'block' : 'none';
}

function guardarForm() {
  var fT = document.getElementById('fT');
  if (!fT || !fT.value.trim()) { alert('El nombre es obligatorio.'); return; }
  var titulo = fT.value.trim();
  var fR = document.getElementById('fR');
  var recur = fR ? fR.value : '';
  var dEl = document.getElementById('fD');
  var eEl = document.getElementById('fE');
  var fN = document.getElementById('fN');
  var fA = document.getElementById('fA');
  var fP = document.getElementById('fP');
  var fF = document.getElementById('fF');
  var fH = document.getElementById('fH');
  var fQ = document.getElementById('fQ');
  var obj = {
    titulo: titulo,
    detalle: fN ? fN.value.trim() : '',
    area: fA ? fA.value : 'pendientes',
    prio: fP ? fP.value : 'normal',
    fecha: fF ? fF.value : '',
    hora: fH ? fH.value : '',
    recur: recur,
    dia: (recur === 'mensual' && dEl && dEl.value) ? parseInt(dEl.value) : null,
    quien: fQ ? fQ.value.trim() : '',
    estado: eEl ? eEl.value : 'pendiente'
  };
  if (editId) {
    for (var i = 0; i < items.length; i++) {
      if (items[i].id === editId) { for (var k in obj) items[i][k] = obj[k]; break; }
    }
  } else {
    obj.id = nextId++;
    items.push(obj);
  }
  guardar(); cerrarModal(); renderTab(tabAct);
  toast(editId ? '✓ Actualizado' : '✓ Guardado');
}

function showSheet() {
  document.getElementById('moverlay').classList.add('on');
  var ms = document.getElementById('msheet');
  setTimeout(function(){ ms.classList.add('on'); }, 10);
}

function cerrarModal() {
  document.getElementById('moverlay').classList.remove('on');
  document.getElementById('msheet').classList.remove('on');
  editId = null;
}

function exportar() {
  var data = JSON.stringify({version:2, items:items}, null, 2);
  var a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(data);
  a.download = 'mi_agenda_backup.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  toast('⬇️ JSON descargado');
}

function importar(e) {
  var file = e.target.files[0]; if (!file) return;
  var r = new FileReader();
  r.onload = function(ev) {
    try {
      var d = JSON.parse(ev.target.result);
      var lista = d.items || d.tareas || d;
      if (!Array.isArray(lista)) throw new Error();
      items = lista.map(function(t) {
        return {
          id: t.id,
          titulo: t.titulo || t.nombre || 'Sin título',
          detalle: t.detalle || t.desc || '',
          area: t.area || 'pendientes',
          prio: t.prio || (t.imp === 'alta' ? 'alta' : t.imp === 'baja' ? 'baja' : 'normal'),
          fecha: t.fecha || '',
          hora: t.hora || '',
          recur: t.recur || '',
          dia: t.dia || null,
          quien: t.quien || t.resp || '',
          estado: t.estado || 'pendiente'
        };
      });
      nextId = items.reduce(function(m,t){ return Math.max(m, t.id||0); }, 0) + 1;
      guardar(); renderTab(tabAct); toast('✓ ' + items.length + ' tareas importadas');
    } catch(err) { toast('⚠️ Archivo no válido'); }
  };
  r.readAsText(file); e.target.value = '';
}

function procesarImagen(e) {
  var file = e.target.files[0]; if (!file) return; e.target.value = '';
  pendingFile = file;
  var key = localStorage.getItem('anthropic_key');
  if (!key) { editarApiKey(true); return; }
  procesarConClaude(file, key);
}

function fileToB64(file) {
  return new Promise(function(ok, fail) {
    var r = new FileReader();
    r.onload = function(e) { ok(e.target.result.split(',')[1]); };
    r.onerror = fail;
    r.readAsDataURL(file);
  });
}

function procesarConClaude(file, apiKey) {
  document.getElementById('mcon').innerHTML =
    '<div style="text-align:center;padding:32px 16px">' +
    '<div style="font-size:44px;margin-bottom:12px">🔍</div>' +
    '<div style="font-size:16px;font-weight:600;margin-bottom:6px">Analizando imagen…</div>' +
    '<div style="font-size:13px;color:var(--t3)">Buscando fechas, horarios y eventos</div>' +
    '</div>';
  showSheet();

  fileToB64(file).then(function(b64) {
    var mt = file.type || 'image/jpeg';
    var prompt = 'Hoy es ' + hoy() + '. Analizá esta imagen: puede ser un horario de clases, turno médico, agenda escolar, programa de eventos, recordatorio o cualquier calendario.\n' +
      'Extraé TODOS los eventos, citas, clases, fechas de entrega o tareas que veas.\n' +
      'Respondé ÚNICAMENTEcon un JSON array válido, sin texto adicional, sin markdown:\n' +
      '[{"titulo":"descripción corta en español","area":"una de: colegio|hogar|compras|salud|maestria|ingles|pagos|remedios|pendientes|tramites|eventos|gimnasio","fecha":"YYYY-MM-DD o null","hora":"HH:MM o null","quien":"persona si se menciona, sino vacío"}]\n' +
      'Si no encontrás nada respondé: []';
    return fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1500,
        messages: [{
          role: 'user',
          content: [
            {type:'image', source:{type:'base64', media_type:mt, data:b64}},
            {type:'text', text:prompt}
          ]
        }]
      })
    });
  }).then(function(res) {
    if (!res.ok) {
      return res.json().then(function(e) {
        throw new Error((e.error && e.error.message) || 'Error ' + res.status);
      });
    }
    return res.json();
  }).then(function(data) {
    var txt = data.content[0].text.trim();
    if (txt.indexOf('```') !== -1) txt = txt.replace(/```json?\n?/g,'').replace(/```/g,'').trim();
    var evs = JSON.parse(txt);
    if (!Array.isArray(evs)) throw new Error('Respuesta inesperada');
    mostrarPreviewEventos(evs);
  }).catch(function(err) {
    document.getElementById('mcon').innerHTML =
      '<div class="stitle">⚠️ Error</div>' +
      '<p style="color:var(--t3);font-size:14px;margin-bottom:16px">' + esc(String(err.message)) + '</p>' +
      '<p style="color:var(--t3);font-size:12px;margin-bottom:16px">Verificá tu API key en Ajustes o intentá con otra imagen.</p>' +
      '<div class="sbtns"><button class="sbtn s" onclick="cerrarModal()">Cerrar</button></div>';
  });
}

      '<div class="sbtns"><button class="sbtn s" onclick="cerrarModal()">Cerrar</button></div>';
    return;
  }
  var html = '<div class="stitle">📋 ' + evs.length + ' evento' + (evs.length > 1 ? 's' : '') + ' encontrado' + (evs.length > 1 ? 's' : '') + '</div>';
  html += '<p style="color:var(--t3);font-size:12px;margin-bottom:12px">Editá los datos y seleccióná cuáles agregar.</p>';

    var ev = evs[i];
    var ao = '';
    for (var j = 0; j < AREAS.length; j++) {
      var a = AREAS[j];
      ao += '<option value="' + a.id + '"' + ((ev.area||'pendientes') === a.id ? ' selected' : '') + '>' + a.i + ' ' + a.l + '</option>';
    }
    html += '<div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:11px;margin-bottom:10px">';

    html += '<div><div style="font-size:10px;font-weight:700;color:var(--t3);margin-bottom:3px">FECHA</div>';

    html += '<div><div style="font-size:10px;font-weight:700;color:var(--t3);margin-bottom:3px">¿PARAQUiÉN?</div>';
    html += '<input id="pq' + i + '" value="' + esc(ev.quien||'') + '" placeholder="Opcional" style="width:100%;font-size:12px;padding:5px 6px;border:1px solid var(--border);border-radius:7px;background:var(--card)"></div>';
    html += '</div></div>';
  }
  html += '<div class="sbtns"><button class="sbtn s" onclick="cerrarModal()">Cancelar</button><button class="sbtn p" onclick="importarEventos(' + evs.length + ')">Agregar seleccionados</button></div>';
  document.getElementById('mcon').innerHTML = html;
}

function importarEventos(n) {
  var cnt = 0;
  for (var i = 0; i < n; i++) {
    var ck = document.getElementById('ck' + i);
    if (!ck || !ck.checked) continue;
    var pt = document.getElementById('pt' + i);
    var titulo = pt ? pt.value.trim() : '';
    if (!titulo) continue;
    var pa = document.getElementById('pa' + i);
    var pf = document.getElementById('pf' + i);
    var ph = document.getElementById('ph' + i);
    var pq = document.getElementById('pq' + i);
    items.push({
      id: nextId++, titulo: titulo,
      area: pa ? pa.value : 'pendientes',
      fecha: pf ? pf.value : '',
      hora: ph ? ph.value : '',
      quien: pq ? pq.value.trim() : '',
      detalle: '', prio: 'normal', recur: '', dia: null, estado: 'pendiente'
    });
    cnt++;
  }
  guardar(); cerrarModal(); renderTab(tabAct);
  toast('✓ ' + cnt + ' tarea' + (cnt !== 1 ? 's' : '') + ' agregada' + (cnt !== 1 ? 's' : ''));
}

function editarApiKey(afterSetup) {
  if (afterSetup === undefined) afterSetup = false;
  var saved = localStorage.getItem('anthropic_key') || '';
  var h = '<div class="stitle">🔑 Anthropic API Key</div>';
  h += '<p style="color:var(--t3);font-size:13px;margin-bottom:14px">Necesaria para extraer eventos de imágenes con IA.<br>Conséguila en <b>console.anthropic.com</b></p>';
  h += '<div class="sfield"><label>API Key</label><input type="password" id="akInput" value="' + esc(saved) + '" placeholder="sk-ant-..."></div>';
  h += '<div class="sbtns">';
  h += '<button class="sbtn s" onclick="' + (saved ? 'borrarApiKey()' : 'cerrarModal()') + '">' + (saved ? 'Borrar key' : 'Cancelar') + '</button>';
  h += '<button class="sbtn p" onclick="guardarApiKey(' + afterSetup + ')">Guardar</button>';
  h += '</div>';
  document.getElementById('mcon').innerHTML = h;
  showSheet();
}

function guardarApiKey(procesarDespues) {
  if (procesarDespues === undefined) procesarDespues = false;
  var akInput = document.getElementById('akInput');
  var key = akInput ? akInput.value.trim() : '';
  if (!key) { alert('Ingresá tu API key'); return; }
  localStorage.setItem('anthropic_key', key);
  cerrarModal();
  if (procesarDespues && pendingFile) {
    setTimeout(function(){ procesarConClaude(pendingFile, key); }, 100);
  } else {
    rConfig(); toast('✓ API Key guardada');
  }
}

function borrarApiKey() {
  localStorage.removeItem('anthropic_key');
  cerrarModal(); rConfig(); toast('🗑 API Key eliminada');
}

var _tt;
function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('on');
  clearTimeout(_tt); _tt = setTimeout(function(){ el.classList.remove('on'); }, 2200);
}

// INIT
document.getElementById('hdrDay').textContent = fmtHoy();
rHoy();
</script>
