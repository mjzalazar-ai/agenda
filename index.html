<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Mi Agenda">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Mi Agenda</title>
<style>
:root {
  --bg:#f2f2f7; --card:#fff; --border:#e5e5ea;
  --t1:#1c1c1e; --t2:#3a3a3c; --t3:#8e8e93;
  --blue:#007aff; --red:#ff3b30; --green:#34c759;
  --r:12px; --safeB:env(safe-area-inset-bottom,0px); --safeT:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--t1);font-size:15px;}
#app{height:100%;display:flex;flex-direction:column;}

/* Header */
.hdr{padding:calc(var(--safeT) + 10px) 16px 8px;background:var(--bg);}
.hdr-top{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:10px;}
.hdr-day{font-size:24px;font-weight:700;}
.hdr-btns{display:flex;gap:6px;}
.hdr-btn{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:13px;font-weight:600;color:var(--blue);cursor:pointer;}
.search-wrap{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 12px;}
.search-wrap input{flex:1;border:none;background:none;font-size:14px;color:var(--t1);outline:none;}
.search-wrap input::placeholder{color:var(--t3);}

/* Views */
#views{flex:1;overflow:hidden;position:relative;}
.view{position:absolute;top:0;right:0;bottom:0;left:0;overflow-y:auto;display:none;-webkit-overflow-scrolling:touch;}
.view.active{display:block;}
.vcont{padding:10px 16px calc(90px + var(--safeB));}

/* Section labels */
.slbl{font-size:12px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 7px;}

/* Task item */
.ti{display:flex;align-items:flex-start;gap:10px;background:var(--card);border-radius:var(--r);padding:12px 12px;margin-bottom:8px;border:1px solid var(--border);}
.ti-chk{width:23px;height:23px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;}
.ti-chk.done{background:var(--green);border-color:var(--green);}
.ti-chk.done::after{content:'✓';color:#fff;font-size:12px;font-weight:800;}
.ti-body{flex:1;min-width:0;}
.ti-title{font-size:15px;font-weight:500;line-height:1.3;word-break:break-word;}
.ti-title.struck{text-decoration:line-through;color:var(--t3);}
.ti-meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;}
.ti-note{font-size:12px;color:var(--t3);margin-top:4px;}
.ti-acts{display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
.ib{background:none;border:none;cursor:pointer;padding:5px 6px;border-radius:7px;font-size:15px;color:var(--t3);}
.ib:active{opacity:.5;}
.ib.red{color:var(--red);}

/* Tags */
.tag{display:inline-flex;align-items:center;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;white-space:nowrap;}
.tag-venc{background:#fee2e2;color:#991b1b;}
.tag-alta{background:#fee2e2;color:#b91c1c;}
.tag-fecha{background:#f0f9ff;color:#0369a1;}
.tag-hora{background:#f0fdf4;color:#166534;}
.tag-quien{background:#f5f3ff;color:#6d28d9;}
.tag-recur{background:#fdf4ff;color:#86198f;font-size:10px;}

/* Areas grid */
.agrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.acard{background:var(--card);border-radius:var(--r);padding:14px 8px 12px;text-align:center;border:1px solid var(--border);cursor:pointer;transition:.1s;}
.acard:active{opacity:.7;transform:scale(.97);}
.acard .ai{font-size:26px;margin-bottom:5px;}
.acard .al{font-size:12px;font-weight:600;color:var(--t2);}
.acard .ac{font-size:11px;color:var(--t3);margin-top:2px;min-height:15px;}
.acard .ac.has{color:var(--blue);font-weight:600;}

/* Area detail */
.area-hdr{display:flex;align-items:center;gap:12px;background:var(--card);border-radius:var(--r);padding:14px;border:1px solid var(--border);margin-bottom:14px;}
.area-hdr .ahi{font-size:34px;}
.area-hdr-txt{flex:1;}
.area-hdr-txt h2{font-size:19px;font-weight:700;}
.area-hdr-txt p{font-size:13px;color:var(--t3);margin-top:1px;}
.back-btn{display:flex;align-items:center;gap:3px;color:var(--blue);font-size:15px;font-weight:500;cursor:pointer;margin-bottom:10px;background:none;border:none;padding:3px 0;}

/* Overdue banner */
.ovb{background:#fee2e2;border:1px solid #fca5a5;border-radius:var(--r);padding:12px 14px;margin-bottom:8px;cursor:pointer;}
.ovb-t{font-weight:700;color:#991b1b;font-size:14px;}
.ovb-s{font-size:12px;color:#b91c1c;margin-top:2px;}

/* Empty */
.empty{text-align:center;color:var(--t3);padding:40px 16px;}
.empty .ei{font-size:42px;margin-bottom:10px;}

/* Date groups */
.dgrp{margin-bottom:10px;}
.dgrp-lbl{font-size:13px;font-weight:700;color:var(--t3);margin-bottom:6px;padding-left:2px;}

/* FAB */
#fab{position:fixed;bottom:calc(68px + var(--safeB));right:18px;width:54px;height:54px;border-radius:50%;background:var(--blue);color:#fff;font-size:26px;border:none;cursor:pointer;box-shadow:0 4px 14px rgba(0,122,255,.45);display:flex;align-items:center;justify-content:center;z-index:100;}
#fab:active{transform:scale(.93);}

/* Bottom nav */
#nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);padding-bottom:var(--safeB);display:flex;z-index:50;}
.ntab{flex:1;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;background:none;border:none;}
.ntab .ni{font-size:22px;}
.ntab .nl{font-size:10px;font-weight:500;color:var(--t3);}
.ntab.active .nl{color:var(--blue);}

/* Modal overlay + sheet */
#moverlay{position:fixed;top:0;right:0;bottom:0;left:0;background:rgba(0,0,0,.4);z-index:200;display:none;}
#moverlay.on{display:block;}
#msheet{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:20px 20px 0 0;padding:14px 16px calc(14px + var(--safeB));max-height:93vh;overflow-y:auto;z-index:201;transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);}
#msheet.on{transform:none;}
.shandle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px;}
.stitle{font-size:18px;font-weight:700;margin-bottom:14px;}
.sfield{margin-bottom:13px;}
.sfield label{display:block;font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;}
.sfield input,.sfield select,.sfield textarea{width:100%;font-size:15px;padding:10px 12px;border:1px solid var(--border);border-radius:10px;background:var(--bg);color:var(--t1);outline:none;-webkit-appearance:none;}
.sfield input:focus,.sfield select:focus,.sfield textarea:focus{border-color:var(--blue);background:var(--card);}
.sfield textarea{height:62px;resize:none;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.sbtns{display:flex;gap:10px;margin-top:6px;}
.sbtn{flex:1;padding:13px;border-radius:12px;border:none;font-size:16px;font-weight:600;cursor:pointer;}
.sbtn.p{background:var(--blue);color:#fff;}
.sbtn.s{background:var(--bg);color:var(--t3);border:1px solid var(--border);}
.sbtn:active{opacity:.8;}

/* Settings */
.set-row{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:8px;cursor:pointer;}
.set-row-l{font-size:15px;}
.set-row-r{color:var(--t3);font-size:13px;}

/* Toast */
#toast{position:fixed;bottom:calc(80px + var(--safeB));left:50%;transform:translateX(-50%);background:rgba(28,28,30,.92);color:#fff;font-size:13px;padding:8px 18px;border-radius:20px;z-index:400;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;}
#toast.on{opacity:1;}

@media(min-width:480px){
  .agrid{grid-template-columns:repeat(4,1fr);}
  #msheet{max-width:480px;left:50%;right:auto;transform:translateX(-50%) translateY(100%);border-radius:20px;bottom:20px;}
  #msheet.on{transform:translateX(-50%) translateY(0);}
}
</style>
</head>
<body>
<div id="app">

  <div class="hdr">
    <div class="hdr-top">
      <div class="hdr-day" id="hdrDay">Hoy</div>
      <div class="hdr-btns">
        <button class="hdr-btn" onclick="document.getElementById('imgInput').click()" title="Subir imagen">📷</button>
        <button class="hdr-btn" onclick="setTab('config')">⚙</button>
      </div>
      <input type="file" id="imgInput" accept="image/*" style="display:none" onchange="procesarImagen(event)">
    </div>
    <div class="search-wrap">
      <span style="color:var(--t3);font-size:14px">🔍</span>
      <input type="text" id="search" placeholder="Buscar en todo..." oninput="onSearch()">
      <button class="ib" id="clrSearch" style="display:none;color:var(--t3)" onclick="clearSearch()">✕</button>
    </div>
  </div>

  <div id="views">
    <div class="view active" id="view-hoy"><div class="vcont" id="c-hoy"></div></div>
    <div class="view" id="view-areas"><div class="vcont" id="c-areas"></div></div>
    <div class="view" id="view-prox"><div class="vcont" id="c-prox"></div></div>
    <div class="view" id="view-config"><div class="vcont" id="c-config"></div></div>
    <div class="view" id="view-search"><div class="vcont" id="c-search"></div></div>
  </div>

  <button id="fab" onclick="abrirModal()">+</button>

  <nav id="nav">
    <button class="ntab active" data-t="hoy" onclick="setTab('hoy')">
      <span class="ni">☀️</span><span class="nl">Hoy</span>
    </button>
    <button class="ntab" data-t="areas" onclick="setTab('areas')">
      <span class="ni">🗂</span><span class="nl">Áreas</span>
    </button>
    <button class="ntab" data-t="prox" onclick="setTab('prox')">
      <span class="ni">📅</span><span class="nl">Próximas</span>
    </button>
  </nav>

  <div id="moverlay" onclick="cerrarModal()"></div>
  <div id="msheet"><div class="shandle"></div><div id="mcon"></div></div>
  <div id="toast"></div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const SK = 'miagenda_v2';

const AREAS = [
  {id:'colegio',   i:'🏫', l:'Colegio',    bg:'#e0f2fe', fg:'#0369a1'},
  {id:'hogar',     i:'🏠', l:'Hogar',      bg:'#fef3c7', fg:'#92400e'},
  {id:'compras',   i:'🛒', l:'Compras',    bg:'#dcfce7', fg:'#166534'},
  {id:'salud',     i:'🩺', l:'Salud',      bg:'#fee2e2', fg:'#991b1b'},
  {id:'maestria',  i:'📚', l:'Maestría',   bg:'#ede9fe', fg:'#5b21b6'},
  {id:'ingles',    i:'🗣️', l:'Inglés',     bg:'#dbeafe', fg:'#1e40af'},
  {id:'pagos',     i:'💰', l:'Pagos',      bg:'#fef9c3', fg:'#854d0e'},
  {id:'remedios',  i:'💊', l:'Remedios',   bg:'#fdf4ff', fg:'#86198f'},
  {id:'pendientes',i:'📋', l:'Pendientes', bg:'#f1f5f9', fg:'#475569'},
  {id:'tramites',  i:'📝', l:'Trámites',   bg:'#fff7ed', fg:'#c2410c'},
  {id:'eventos',   i:'📅', l:'Eventos',    bg:'#faf5ff', fg:'#7e22ce'},
  {id:'gimnasio',  i:'🏋️', l:'Gimnasio',  bg:'#f0fdf4', fg:'#15803d'},
];
const AM = AREAS.reduce((o,a)=>{o[a.id]=a;return o;},{});

// ── DATA ──────────────────────────────────────────────────────────────────────
function cargar(){
  try{const d=localStorage.getItem(SK);if(d)return JSON.parse(d);}catch(e){}
  return{items:[],nextId:1};
}
function guardar(){try{localStorage.setItem(SK,JSON.stringify({items,nextId}));}catch(e){}}

let {items,nextId}=cargar();
let editId=null, tabAct='hoy', areaAct=null, searchQ='', vencOpen=false, pendingFile=null;

// ── UTILS ─────────────────────────────────────────────────────────────────────
const hoy=()=>new Date().toISOString().slice(0,10);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function fmtF(f){
  if(!f)return'';
  const t=hoy();
  const tom=new Date();tom.setDate(tom.getDate()+1);
  const ts=tom.toISOString().slice(0,10);
  if(f===t)return'Hoy';if(f===ts)return'Mañana';
  const d=new Date(f+'T12:00:00');
  const ds=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const ms=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const [y,m,dd]=f.split('-');
  const diff=Math.round((d-new Date())/86400000);
  if(diff>-8&&diff<15)return`${ds[d.getDay()]} ${dd}/${m}`;
  return`${dd}/${m}/${String(y).slice(2)}`;
}

function isVenc(t){return t.fecha&&t.fecha<hoy()&&t.estado!=='completado';}

function diasEnMes(y,m){return new Date(y,m+1,0).getDate();}

function avanzar(t){
  const f=new Date(t.fecha+'T00:00:00');
  if(t.recur==='diaria')f.setDate(f.getDate()+1);
  else if(t.recur==='semanal')f.setDate(f.getDate()+7);
  else if(t.recur==='mensual'){f.setMonth(f.getMonth()+1);if(t.dia)f.setDate(Math.min(t.dia,diasEnMes(f.getFullYear(),f.getMonth())));}
  else if(t.recur==='anual')f.setFullYear(f.getFullYear()+1);
  t.fecha=f.toISOString().slice(0,10);t.estado='pendiente';
}

// ── RENDER UTILS ──────────────────────────────────────────────────────────────
function atag(id){
  const a=AM[id];if(!a)return'';
  return`<span class="tag" style="background:${a.bg};color:${a.fg}">${a.i} ${a.l}</span>`;
}

function tiHtml(t,showArea=true){
  const done=t.estado==='completado', venc=isVenc(t);
  return`<div class="ti">
    <div class="ti-chk${done?' done':''}" onclick="toggleDone(${t.id})"></div>
    <div class="ti-body">
      <div class="ti-title${done?' struck':''}">${esc(t.titulo)}</div>
      <div class="ti-meta">
        ${showArea?atag(t.area):''}
        ${t.prio==='alta'?'<span class="tag tag-alta">❗Alta</span>':''}
        ${t.hora?`<span class="tag tag-hora">⏰ ${t.hora}</span>`:''}
        ${t.fecha&&!done?`<span class="tag ${venc?'tag-venc':'tag-fecha'}">${venc?'⚠️ ':''}${fmtF(t.fecha)}</span>`:''}
        ${t.quien?`<span class="tag tag-quien">👤 ${esc(t.quien)}</span>`:''}
        ${t.recur?`<span class="tag tag-recur">↻ ${t.recur}</span>`:''}
      </div>
      ${t.detalle?`<div class="ti-note">${esc(t.detalle)}</div>`:''}
    </div>
    <div class="ti-acts">
      <button class="ib" onclick="abrirEditar(${t.id})" title="Editar">✎</button>
      <button class="ib red" onclick="pedirEliminar(${t.id})" title="Eliminar">✕</button>
    </div>
  </div>`;
}

// ── VIEWS ─────────────────────────────────────────────────────────────────────
function setTab(tab){
  if(tab!=='areas')areaAct=null;
  tabAct=tab;
  document.querySelectorAll('.ntab').forEach(b=>b.classList.toggle('active',b.dataset.t===tab));
  document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id==='view-'+tab));
  const titles={hoy:fmtHoy(),areas:'Mis Áreas',prox:'Próximas',config:'Ajustes',search:'Búsqueda'};
  document.getElementById('hdrDay').textContent=titles[tab]||tab;
  renderTab(tab);
}

function fmtHoy(){
  const d=new Date();
  const ds=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const ms=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return`${ds[d.getDay()]} ${d.getDate()} de ${ms[d.getMonth()]}`;
}

function renderTab(tab){
  if(tab==='hoy')rHoy();
  else if(tab==='areas')areaAct?rAreaDet():rAreas();
  else if(tab==='prox')rProx();
  else if(tab==='config')rConfig();
  else if(tab==='search')rSearch();
}

// HOY
function rHoy(){
  const h=hoy();
  const hoyT=items.filter(t=>t.fecha===h&&t.estado!=='completado').sort((a,b)=>(a.hora||'23:59').localeCompare(b.hora||'23:59'));
  const venc=items.filter(t=>isVenc(t));
  const altas=items.filter(t=>!t.fecha&&t.estado==='pendiente'&&t.prio==='alta').slice(0,6);
  const manT=new Date();manT.setDate(manT.getDate()+1);
  const manS=manT.toISOString().slice(0,10);
  const man=items.filter(t=>t.fecha===manS&&t.estado!=='completado').sort((a,b)=>(a.hora||'23:59').localeCompare(b.hora||'23:59'));

  let h2='';

  if(venc.length){
    h2+=`<div class="ovb" onclick="toggleVenc()">
      <div class="ovb-t">⚠️ ${venc.length} vencida${venc.length>1?'s':''}</div>
      <div class="ovb-s" id="vencSub">${vencOpen?'Tocá para ocultar':'Tocá para ver'}</div>
    </div>
    <div id="vencList" style="display:${vencOpen?'block':'none'}">${venc.map(t=>tiHtml(t)).join('')}</div>`;
  }

  if(!hoyT.length&&!venc.length&&!altas.length){
    h2+=`<div class="empty"><div class="ei">🌟</div>¡Todo al día! No hay tareas para hoy.</div>`;
  } else {
    if(hoyT.length){
      const rem=hoyT.filter(t=>t.area==='remedios');
      const resto=hoyT.filter(t=>t.area!=='remedios');
      if(rem.length){h2+=`<div class="slbl">💊 Remedios</div>`+rem.map(t=>tiHtml(t,false)).join('');}
      if(resto.length){h2+=`<div class="slbl">📋 Para hoy (${resto.length})</div>`+resto.map(t=>tiHtml(t)).join('');}
    }
    if(altas.length){
      h2+=`<div class="slbl">❗ Alta prioridad sin fecha</div>`+altas.map(t=>tiHtml(t)).join('');
    }
  }

  if(man.length){
    h2+=`<div class="slbl">Mañana (${man.length})</div>`+man.map(t=>tiHtml(t)).join('');
  }

  // Quick summary by area
  const pendByArea=AREAS.map(a=>({a,n:items.filter(t=>t.area===a.id&&t.estado!=='completado').length})).filter(x=>x.n>0);
  if(pendByArea.length){
    h2+=`<div class="slbl">Resumen por área</div><div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:8px">`;
    for(const {a,n} of pendByArea){
      h2+=`<span class="tag" style="background:${a.bg};color:${a.fg};cursor:pointer;padding:4px 10px;font-size:12px" onclick="irArea('${a.id}')">${a.i} ${a.l} <b>${n}</b></span>`;
    }
    h2+='</div>';
  }

  document.getElementById('c-hoy').innerHTML=h2||'<div class="empty"><div class="ei">🌟</div>Todo al día.</div>';
}

function toggleVenc(){
  vencOpen=!vencOpen;
  const el=document.getElementById('vencList');
  const sub=document.getElementById('vencSub');
  if(el)el.style.display=vencOpen?'block':'none';
  if(sub)sub.textContent=vencOpen?'Tocá para ocultar':'Tocá para ver';
}

// ÁREAS
function rAreas(){
  let h='<div class="agrid">';
  for(const a of AREAS){
    const n=items.filter(t=>t.area===a.id&&t.estado!=='completado').length;
    h+=`<div class="acard" onclick="irArea('${a.id}')">
      <div class="ai">${a.i}</div>
      <div class="al">${a.l}</div>
      <div class="ac${n?' has':''}">${n?`${n} pend.`:' '}</div>
    </div>`;
  }
  h+='</div>';
  document.getElementById('c-areas').innerHTML=h;
}

function irArea(id){
  areaAct=id;
  if(tabAct!=='areas'){setTab('areas');}
  else{rAreaDet();document.getElementById('hdrDay').textContent=AM[id]?.l||id;}
}

function rAreaDet(){
  const a=AM[areaAct];if(!a)return;
  const pend=items.filter(t=>t.area===areaAct&&t.estado!=='completado').sort((a,b)=>{
    if(a.fecha&&b.fecha)return a.fecha.localeCompare(b.fecha);
    if(a.fecha)return-1;if(b.fecha)return 1;return 0;
  });
  const done=items.filter(t=>t.area===areaAct&&t.estado==='completado');
  let h=`<button class="back-btn" onclick="volverAreas()">← Áreas</button>
  <div class="area-hdr">
    <div class="ahi">${a.i}</div>
    <div class="area-hdr-txt"><h2>${a.l}</h2><p>${pend.length} pendiente${pend.length!==1?'s':''}</p></div>
    <button class="hdr-btn" onclick="abrirModalArea('${areaAct}')">+ Agregar</button>
  </div>`;
  if(!pend.length&&!done.length){
    h+=`<div class="empty"><div class="ei">${a.i}</div>No hay tareas en ${a.l}.</div>`;
  }
  if(pend.length)h+=pend.map(t=>tiHtml(t,false)).join('');
  if(done.length){
    h+=`<div class="slbl">Completados (${done.length})</div>`;
    h+=done.map(t=>tiHtml(t,false)).join('');
  }
  document.getElementById('c-areas').innerHTML=h;
  document.getElementById('hdrDay').textContent=a.l;
}

function volverAreas(){areaAct=null;rAreas();document.getElementById('hdrDay').textContent='Mis Áreas';}

// PRÓXIMAS
function rProx(){
  const grupos=[];
  for(let i=1;i<=21;i++){
    const d=new Date();d.setDate(d.getDate()+i);
    const ds=d.toISOString().slice(0,10);
    const its=items.filter(t=>t.fecha===ds&&t.estado!=='completado');
    if(its.length)grupos.push({ds,its});
  }
  if(!grupos.length){
    document.getElementById('c-prox').innerHTML='<div class="empty"><div class="ei">📅</div>Sin tareas en los próximos 21 días.</div>';
    return;
  }
  const dN=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const mN=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  let h='';
  for(const g of grupos){
    const d=new Date(g.ds+'T12:00:00');
    h+=`<div class="dgrp"><div class="dgrp-lbl">${dN[d.getDay()]} ${d.getDate()} ${mN[d.getMonth()]}</div>${g.its.map(t=>tiHtml(t)).join('')}</div>`;
  }
  document.getElementById('c-prox').innerHTML=h;
}

// CONFIG
function rConfig(){
  const tot=items.length,comp=items.filter(t=>t.estado==='completado').length;
  document.getElementById('c-config').innerHTML=`
  <div class="slbl">Datos</div>
  <div class="set-row"><span class="set-row-l">📊 Total de tareas</span><span class="set-row-r">${tot}</span></div>
  <div class="set-row"><span class="set-row-l">✅ Completadas</span><span class="set-row-r">${comp}</span></div>
  <div class="set-row"><span class="set-row-l">📋 Pendientes</span><span class="set-row-r">${tot-comp}</span></div>
  <div class="slbl">Copia de seguridad</div>
  <div class="set-row" onclick="exportar()"><span class="set-row-l">⬇️ Exportar JSON</span><span class="set-row-r">›</span></div>
  <div class="set-row" onclick="document.getElementById('fInput').click()"><span class="set-row-l">⬆️ Importar JSON</span><span class="set-row-r">›</span></div>
  <input type="file" id="fInput" accept=".json" style="display:none" onchange="importar(event)">
  <div class="slbl">Extracción desde imagen (IA)</div>
  <div class="set-row" onclick="document.getElementById('imgInput').click()"><span class="set-row-l">📷 Subir imagen</span><span class="set-row-r">Extraer eventos</span></div>
  <div class="set-row" onclick="editarApiKey()"><span class="set-row-l">🔑 Anthropic API Key</span><span class="set-row-r">${localStorage.getItem('anthropic_key')?'✓ Configurada':'Sin configurar'}</span></div>
  <div class="slbl">Agregar rápido por área</div>
  ${AREAS.map(a=>`<div class="set-row" onclick="abrirModalArea('${a.id}')"><span class="set-row-l">${a.i} ${a.l}</span><span class="set-row-r">+ Agregar</span></div>`).join('')}
  <div style="height:10px"></div>`;
}

// SEARCH
function onSearch(){
  const q=document.getElementById('search').value.trim().toLowerCase();
  searchQ=q;
  document.getElementById('clrSearch').style.display=q?'':'none';
  if(q){
    if(tabAct!=='search'){
      document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id==='view-search'));
      document.querySelectorAll('.ntab').forEach(b=>b.classList.remove('active'));
      document.getElementById('hdrDay').textContent='Búsqueda';
    }
    rSearch();
  } else {
    setTab(tabAct==='search'?'hoy':tabAct);
  }
}

function clearSearch(){
  document.getElementById('search').value='';
  searchQ='';
  document.getElementById('clrSearch').style.display='none';
  setTab('hoy');
}

function rSearch(){
  const q=searchQ;
  if(!q){document.getElementById('c-search').innerHTML='';return;}
  const res=items.filter(t=>
    t.titulo.toLowerCase().includes(q)||
    (t.detalle||'').toLowerCase().includes(q)||
    (t.quien||'').toLowerCase().includes(q)||
    (AM[t.area]?.l||'').toLowerCase().includes(q)
  );
  let h=`<div class="slbl">${res.length} resultado${res.length!==1?'s':''} para "${esc(q)}"</div>`;
  h+=res.length?res.map(t=>tiHtml(t)).join(''):'<div class="empty">No se encontró nada.</div>';
  document.getElementById('c-search').innerHTML=h;
}

// ── ACCIONES ──────────────────────────────────────────────────────────────────
function toggleDone(id){
  const t=items.find(x=>x.id===id);if(!t)return;
  if(t.recur&&t.estado!=='completado'){avanzar(t);toast('↻ Ciclo avanzado');}
  else{t.estado=t.estado==='completado'?'pendiente':'completado';}
  guardar();renderTab(tabAct);
}

function pedirEliminar(id){
  const t=items.find(x=>x.id===id);if(!t)return;
  document.getElementById('mcon').innerHTML=`
    <div class="stitle">¿Eliminar tarea?</div>
    <p style="color:var(--t3);font-size:14px;margin-bottom:16px">"${esc(t.titulo)}" se eliminará para siempre.</p>
    <div class="sbtns">
      <button class="sbtn s" onclick="cerrarModal()">Cancelar</button>
      <button class="sbtn" style="background:var(--red);color:#fff" onclick="eliminar(${id})">Eliminar</button>
    </div>`;
  showSheet();
}

function eliminar(id){
  items=items.filter(x=>x.id!==id);
  guardar();cerrarModal();renderTab(tabAct);toast('🗑 Eliminado');
}

// ── FORMULARIO ────────────────────────────────────────────────────────────────
function abrirModal(def=''){
  editId=null;
  mostrarForm({titulo:'',detalle:'',area:def||areaAct||'pendientes',estado:'pendiente',fecha:'',hora:'',recur:'',dia:'',quien:'',prio:'normal'});
}
function abrirModalArea(id){cerrarModal();setTimeout(()=>abrirModal(id),60);}
function abrirEditar(id){
  editId=id;const t=items.find(x=>x.id===id);if(!t)return;
  mostrarForm({...t,dia:t.dia||'',recur:t.recur||''});
}

function mostrarForm(f){
  const ao=AREAS.map(a=>`<option value="${a.id}"${f.area===a.id?' selected':''}>${a.i} ${a.l}</option>`).join('');
  document.getElementById('mcon').innerHTML=`
    <div class="stitle">${editId?'Editar':'Nueva tarea'}</div>
    <div class="sfield"><label>Tarea *</label>
      <input id="fT" value="${esc(f.titulo)}" placeholder="¿Qué hay que hacer?">
    </div>
    <div class="frow">
      <div class="sfield"><label>Área</label><select id="fA">${ao}</select></div>
      <div class="sfield"><label>Prioridad</label>
        <select id="fP">
          <option value="normal"${f.prio==='normal'?' selected':''}>Normal</option>
          <option value="alta"${f.prio==='alta'?' selected':''}>❗ Alta</option>
          <option value="baja"${f.prio==='baja'?' selected':''}>Baja</option>
        </select>
      </div>
    </div>
    <div class="frow">
      <div class="sfield"><label>Fecha</label><input type="date" id="fF" value="${f.fecha}"></div>
      <div class="sfield"><label>Hora</label><input type="time" id="fH" value="${f.hora||''}"></div>
    </div>
    <div class="frow">
      <div class="sfield"><label>Repite</label>
        <select id="fR" onchange="onRecur()">
          <option value=""${!f.recur?' selected':''}>No repite</option>
          <option value="diaria"${f.recur==='diaria'?' selected':''}>Diaria</option>
          <option value="semanal"${f.recur==='semanal'?' selected':''}>Semanal</option>
          <option value="mensual"${f.recur==='mensual'?' selected':''}>Mensual</option>
          <option value="anual"${f.recur==='anual'?' selected':''}>Anual</option>
        </select>
      </div>
      <div class="sfield"><label>¿Para quién?</label>
        <input id="fQ" value="${esc(f.quien||'')}" placeholder="Ramiro, Milán, Yo…">
      </div>
    </div>
    <div class="sfield" id="fDW" style="display:${f.recur==='mensual'?'block':'none'}">
      <label>Día del mes</label>
      <input type="number" id="fD" min="1" max="31" value="${f.dia||''}" placeholder="Ej: 10">
    </div>
    <div class="sfield"><label>Notas</label>
      <textarea id="fN" placeholder="Detalle adicional…">${esc(f.detalle||'')}</textarea>
    </div>
    ${editId?`<div class="sfield"><label>Estado</label>
      <select id="fE">
        <option value="pendiente"${f.estado==='pendiente'?' selected':''}>Pendiente</option>
        <option value="en-curso"${f.estado==='en-curso'?' selected':''}>En curso</option>
        <option value="completado"${f.estado==='completado'?' selected':''}>Completado</option>
      </select></div>`:''}
    <div class="sbtns">
      <button class="sbtn s" onclick="cerrarModal()">Cancelar</button>
      <button class="sbtn p" onclick="guardarForm()">Guardar</button>
    </div>`;
  showSheet();
  setTimeout(()=>document.getElementById('fT')?.focus(),250);
}

function onRecur(){
  const r=document.getElementById('fR')?.value;
  const w=document.getElementById('fDW');
  if(w)w.style.display=r==='mensual'?'block':'none';
}

function guardarForm(){
  const titulo=document.getElementById('fT')?.value.trim();
  if(!titulo){alert('El nombre es obligatorio.');return;}
  const recur=document.getElementById('fR')?.value||'';
  const dEl=document.getElementById('fD');
  const eEl=document.getElementById('fE');
  const obj={
    titulo,
    detalle:document.getElementById('fN')?.value.trim()||'',
    area:document.getElementById('fA')?.value||'pendientes',
    prio:document.getElementById('fP')?.value||'normal',
    fecha:document.getElementById('fF')?.value||'',
    hora:document.getElementById('fH')?.value||'',
    recur,
    dia:recur==='mensual'&&dEl?.value?parseInt(dEl.value):null,
    quien:document.getElementById('fQ')?.value.trim()||'',
    estado:eEl?eEl.value:'pendiente',
  };
  if(editId)items=items.map(t=>t.id===editId?{...t,...obj}:t);
  else items.push({id:nextId++,...obj});
  guardar();cerrarModal();renderTab(tabAct);
  toast(editId?'✓ Actualizado':'✓ Guardado');
}

// ── SHEET ─────────────────────────────────────────────────────────────────────
function showSheet(){
  document.getElementById('moverlay').classList.add('on');
  requestAnimationFrame(()=>document.getElementById('msheet').classList.add('on'));
}
function cerrarModal(){
  document.getElementById('moverlay').classList.remove('on');
  document.getElementById('msheet').classList.remove('on');
  editId=null;
}

// ── EXPORT / IMPORT ───────────────────────────────────────────────────────────
function exportar(){
  const data=JSON.stringify({version:2,items},null,2);
  const a=document.createElement('a');
  a.href='data:application/json;charset=utf-8,'+encodeURIComponent(data);
  a.download='mi_agenda_backup.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  toast('⬇️ JSON descargado');
}
function importar(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      const lista=d.items||d.tareas||d;
      if(!Array.isArray(lista))throw new Error();
      // Migrate old format if needed
      items=lista.map(t=>({
        id:t.id,
        titulo:t.titulo||t.nombre||'Sin título',
        detalle:t.detalle||t.desc||'',
        area:t.area||(t.imp?'pendientes':'pendientes'),
        prio:t.prio||(t.imp==='alta'?'alta':t.imp==='baja'?'baja':'normal'),
        fecha:t.fecha||'',
        hora:t.hora||'',
        recur:t.recur||'',
        dia:t.dia||null,
        quien:t.quien||t.resp||'',
        estado:t.estado||'pendiente',
      }));
      nextId=items.reduce((m,t)=>Math.max(m,t.id||0),0)+1;
      guardar();renderTab(tabAct);toast(`✓ ${items.length} tareas importadas`);
    }catch{toast('⚠️ Archivo no válido');}
  };
  r.readAsText(file);e.target.value='';
}

// ── IMAGEN + IA ───────────────────────────────────────────────────────────────

function procesarImagen(e){
  const file=e.target.files[0]; if(!file)return; e.target.value='';
  pendingFile=file;
  const key=localStorage.getItem('anthropic_key');
  if(!key){ editarApiKey(true); return; }
  procesarConClaude(file,key);
}

async function procesarConClaude(file,apiKey){
  document.getElementById('mcon').innerHTML=`
    <div style="text-align:center;padding:32px 16px">
      <div style="font-size:44px;margin-bottom:12px">🔍</div>
      <div style="font-size:16px;font-weight:600;margin-bottom:6px">Analizando imagen…</div>
      <div style="font-size:13px;color:var(--t3)">Buscando fechas, horarios y eventos</div>
    </div>`;
  showSheet();
  try{
    const b64=await fileToB64(file);
    const mt=file.type||'image/jpeg';
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true',
      },
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:1500,
        messages:[{
          role:'user',
          content:[
            {type:'image',source:{type:'base64',media_type:mt,data:b64}},
            {type:'text',text:`Hoy es ${hoy()}. Analizá esta imagen: puede ser un horario de clases, turno médico, agenda escolar, programa de eventos, recordatorio o cualquier calendario.
Extraé TODOS los eventos, citas, clases, fechas de entrega o tareas que veas.
Respondé ÚNICAMENTE con un JSON array válido, sin texto adicional, sin markdown:
[{"titulo":"descripción corta en español","area":"una de: colegio|hogar|compras|salud|maestria|ingles|pagos|remedios|pendientes|tramites|eventos|gimnasio","fecha":"YYYY-MM-DD o null","hora":"HH:MM o null","quien":"persona si se menciona, sino vacío"}]
Si no encontrás nada respondé: []`}
          ]
        }]
      })
    });
    if(!res.ok){const e=await res.json();throw new Error(e.error?.message||`Error ${res.status}`);}
    const data=await res.json();
    let txt=data.content[0].text.trim();
    if(txt.includes('```'))txt=txt.replace(/```json?\n?/g,'').replace(/```/g,'').trim();
    const evs=JSON.parse(txt);
    if(!Array.isArray(evs))throw new Error('Respuesta inesperada');
    mostrarPreviewEventos(evs);
  }catch(err){
    document.getElementById('mcon').innerHTML=`
      <div class="stitle">⚠️ Error</div>
      <p style="color:var(--t3);font-size:14px;margin-bottom:16px">${esc(String(err.message))}</p>
      <p style="color:var(--t3);font-size:12px;margin-bottom:16px">Verificá tu API key en Ajustes o intentá con otra imagen.</p>
      <div class="sbtns"><button class="sbtn s" onclick="cerrarModal()">Cerrar</button></div>`;
  }
}

function fileToB64(file){
  return new Promise((ok,fail)=>{
    const r=new FileReader();
    r.onload=e=>ok(e.target.result.split(',')[1]);
    r.onerror=fail;
    r.readAsDataURL(file);
  });
}

function mostrarPreviewEventos(evs){
  if(!evs.length){
    document.getElementById('mcon').innerHTML=`
      <div class="stitle">Sin resultados</div>
      <p style="color:var(--t3);font-size:14px;margin-bottom:16px">No se encontraron eventos en la imagen. Probá con una foto más clara o con mejor iluminación.</p>
      <div class="sbtns"><button class="sbtn s" onclick="cerrarModal()">Cerrar</button></div>`;
    return;
  }
  let html=`<div class="stitle">📋 ${evs.length} evento${evs.length>1?'s':''} encontrado${evs.length>1?'s':''}</div>
  <p style="color:var(--t3);font-size:12px;margin-bottom:12px">Editá los datos si es necesario y seleccioná cuáles agregar.</p>`;
  evs.forEach((ev,i)=>{
    const ao=AREAS.map(a=>`<option value="${a.id}"${(ev.area||'pendientes')===a.id?' selected':''}>${a.i} ${a.l}</option>`).join('');
    html+=`<div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:11px;margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <input type="checkbox" id="ck${i}" checked style="width:18px;height:18px;cursor:pointer;flex-shrink:0">
        <input id="pt${i}" value="${esc(ev.titulo||'')}" style="flex:1;border:none;background:none;font-size:14px;font-weight:600;color:var(--t1);outline:none;min-width:0">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px">
        <div><div style="font-size:10px;font-weight:700;color:var(--t3);margin-bottom:3px">ÁREA</div>
          <select id="pa${i}" style="width:100%;font-size:12px;padding:5px 6px;border:1px solid var(--border);border-radius:7px;background:var(--card);-webkit-appearance:none">${ao}</select></div>
        <div><div style="font-size:10px;font-weight:700;color:var(--t3);margin-bottom:3px">FECHA</div>
          <input type="date" id="pf${i}" value="${ev.fecha||''}" style="width:100%;font-size:12px;padding:5px 6px;border:1px solid var(--border);border-radius:7px;background:var(--card)"></div>
        <div><div style="font-size:10px;font-weight:700;color:var(--t3);margin-bottom:3px">HORA</div>
          <input type="time" id="ph${i}" value="${ev.hora||''}" style="width:100%;font-size:12px;padding:5px 6px;border:1px solid var(--border);border-radius:7px;background:var(--card)"></div>
        <div><div style="font-size:10px;font-weight:700;color:var(--t3);margin-bottom:3px">¿PARA QUIÉN?</div>
          <input id="pq${i}" value="${esc(ev.quien||'')}" placeholder="Opcional" style="width:100%;font-size:12px;padding:5px 6px;border:1px solid var(--border);border-radius:7px;background:var(--card)"></div>
      </div>
    </div>`;
  });
  html+=`<div class="sbtns">
    <button class="sbtn s" onclick="cerrarModal()">Cancelar</button>
    <button class="sbtn p" onclick="importarEventos(${evs.length})">Agregar seleccionados</button>
  </div>`;
  document.getElementById('mcon').innerHTML=html;
}

function importarEventos(n){
  let cnt=0;
  for(let i=0;i<n;i++){
    if(!document.getElementById(`ck${i}`)?.checked)continue;
    const titulo=document.getElementById(`pt${i}`)?.value.trim();
    if(!titulo)continue;
    items.push({id:nextId++,titulo,area:document.getElementById(`pa${i}`)?.value||'pendientes',
      fecha:document.getElementById(`pf${i}`)?.value||'',hora:document.getElementById(`ph${i}`)?.value||'',
      quien:document.getElementById(`pq${i}`)?.value.trim()||'',detalle:'',prio:'normal',recur:'',dia:null,estado:'pendiente'});
    cnt++;
  }
  guardar();cerrarModal();renderTab(tabAct);
  toast(`✓ ${cnt} tarea${cnt!==1?'s':''} agregada${cnt!==1?'s':''}`);
}

function editarApiKey(afterSetup=false){
  const saved=localStorage.getItem('anthropic_key')||'';
  document.getElementById('mcon').innerHTML=`
    <div class="stitle">🔑 Anthropic API Key</div>
    <p style="color:var(--t3);font-size:13px;margin-bottom:14px">
      Necesaria para extraer eventos de imágenes con IA.<br>
      Conseguila gratis en <b>console.anthropic.com</b>
    </p>
    <div class="sfield"><label>API Key</label>
      <input type="password" id="akInput" value="${esc(saved)}" placeholder="sk-ant-...">
    </div>
    <div class="sbtns">
      <button class="sbtn s" onclick="${saved?'borrarApiKey()':'cerrarModal()'}">${saved?'Borrar key':'Cancelar'}</button>
      <button class="sbtn p" onclick="guardarApiKey(${afterSetup})">Guardar</button>
    </div>`;
  showSheet();
}

function guardarApiKey(procesarDespues=false){
  const key=document.getElementById('akInput')?.value.trim();
  if(!key){alert('Ingresá tu API key');return;}
  localStorage.setItem('anthropic_key',key);
  cerrarModal();
  if(procesarDespues&&pendingFile)setTimeout(()=>procesarConClaude(pendingFile,key),100);
  else{rConfig();toast('✓ API Key guardada');}
}

function borrarApiKey(){
  localStorage.removeItem('anthropic_key');
  cerrarModal();rConfig();toast('🗑 API Key eliminada');
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
let _tt;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('on');
  clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('on'),2200);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
try{
  document.getElementById('hdrDay').textContent=fmtHoy();
  rHoy();
}catch(e){
  document.getElementById('app').innerHTML=`<div style="padding:40px 20px;text-align:center;font-family:sans-serif">
    <div style="font-size:40px;margin-bottom:16px">⚠️</div>
    <div style="font-size:17px;font-weight:700;margin-bottom:8px">Error al iniciar</div>
    <div style="font-size:13px;color:#666;margin-bottom:20px">${e.message}</div>
    <button onclick="location.reload()" style="background:#007aff;color:#fff;border:none;padding:12px 28px;border-radius:12px;font-size:16px;font-weight:600">Reintentar</button>
  </div>`;
}
