<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Agenda Personal</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f3; color: #1a1a1a; font-size: 15px; }
  .container { max-width: 1200px; margin: 0 auto; padding: 20px 14px; }
  h1 { font-size: 20px; font-weight: 700; margin-bottom: 18px; }

  .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 16px; }
  .stat { background:#fff; border:1px solid #e5e5e5; border-radius:10px; padding:12px 14px; }
  .stat .lbl { font-size:11px; color:#888; margin-bottom:3px; }
  .stat .val { font-size:20px; font-weight:700; }

  .toolbar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; align-items:center; }
  .toolbar input, .toolbar select { font-size:14px; padding:9px 11px; border:1px solid #ddd; border-radius:9px; background:#fff; color:#1a1a1a; outline:none; width:100%; }
  .toolbar input { flex:1; min-width:140px; }
  .t-row { display:flex; gap:8px; width:100%; flex-wrap:wrap; }
  .t-row select { flex:1; min-width:130px; }

  .exportbar { display:flex; gap:8px; flex-wrap:wrap; align-items:center; background:#fff; border:1px solid #e5e5e5; border-radius:10px; padding:10px 12px; margin-bottom:14px; }
  .exportbar .lbl { font-size:12px; color:#888; width:100%; }

  .btn { font-size:13px; padding:9px 16px; border-radius:9px; border:1px solid #ddd; background:#fff; color:#1a1a1a; cursor:pointer; white-space:nowrap; }
  .btn:active { opacity:.7; }
  .btn.primary { background:#dbeafe; color:#1e40af; border-color:#93c5fd; font-weight:600; }
  .btn.danger-sm { font-size:12px; padding:5px 12px; background:#fee2e2; color:#991b1b; border:1px solid #fca5a5; border-radius:7px; cursor:pointer; }
  .btn.cancel-sm { font-size:12px; padding:5px 12px; background:#fff; color:#555; border:1px solid #ddd; border-radius:7px; cursor:pointer; }
  .btn.icon { background:none; border:none; cursor:pointer; padding:6px 8px; border-radius:6px; font-size:16px; color:#888; }
  .btn.icon.red { color:#dc2626; }

  .form-box { background:#fff; border:1px solid #ddd; border-radius:12px; padding:18px; margin-bottom:14px; }
  .form-box h3 { font-size:16px; font-weight:700; margin-bottom:14px; }
  .field { margin-bottom:12px; }
  .field label { display:block; font-size:12px; color:#666; margin-bottom:4px; font-weight:500; }
  .field input, .field select, .field textarea { width:100%; font-size:14px; padding:9px 11px; border:1px solid #ddd; border-radius:9px; background:#fff; color:#1a1a1a; outline:none; }
  .field textarea { height:56px; resize:vertical; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color:#93c5fd; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .sep { border-top:1px solid #eee; margin:12px 0; }
  .form-btns { display:flex; gap:8px; justify-content:flex-end; margin-top:14px; }

  /* Cards en mobile, tabla en desktop */
  .table-wrap { display:none; background:#fff; border:1px solid #e5e5e5; border-radius:12px; overflow:hidden; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; font-size:11px; font-weight:600; color:#888; padding:10px 12px; border-bottom:1px solid #eee; background:#fafafa; white-space:nowrap; cursor:pointer; user-select:none; }
  th:hover { background:#f0f0f0; color:#333; }
  th .si { margin-left:3px; opacity:.4; }
  th.active .si { opacity:1; color:#1e40af; }
  td { padding:10px 12px; border-bottom:1px solid #f0f0f0; vertical-align:middle; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:#fafafa; }

  .cards { display:flex; flex-direction:column; gap:10px; }
  .card { background:#fff; border:1px solid #e5e5e5; border-radius:12px; padding:14px; }
  .card-top { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; margin-bottom:8px; }
  .card-nombre { font-weight:600; font-size:15px; flex:1; }
  .card-desc { font-size:12px; color:#888; margin-bottom:8px; }
  .card-meta { display:flex; flex-wrap:wrap; gap:6px; align-items:center; margin-bottom:10px; }
  .card-actions { display:flex; gap:8px; align-items:center; flex-wrap:wrap; border-top:1px solid #f0f0f0; padding-top:10px; }
  .card-actions select { font-size:12px; padding:5px 8px; border:1px solid #ddd; border-radius:7px; background:#fff; color:#333; flex:1; }
  .confirm-inline { display:flex; gap:8px; align-items:center; }
  .confirm-inline span { font-size:12px; color:#666; }

  .tag { display:inline-block; font-size:11px; padding:3px 9px; border-radius:20px; font-weight:600; }
  .tag.alta { background:#fee2e2; color:#991b1b; }
  .tag.media { background:#fef3c7; color:#92400e; }
  .tag.baja { background:#dcfce7; color:#166534; }
  .tag.pendiente { background:#dbeafe; color:#1e40af; }
  .tag.en-curso { background:#fef3c7; color:#92400e; }
  .tag.completado { background:#dcfce7; color:#166534; }
  .tag.vencido { background:#fee2e2; color:#991b1b; }
  .tag.recur { background:#ede9fe; color:#5b21b6; font-size:10px; }

  .avatar { display:inline-flex; align-items:center; justify-content:center; width:26px; height:26px; border-radius:50%; background:#e0e7ff; color:#3730a3; font-size:10px; font-weight:700; margin-right:5px; flex-shrink:0; }
  .resp-cell { display:flex; align-items:center; }

  .fecha-warn { color:#b45309; font-size:12px; }
  .fecha-ok { color:#666; font-size:12px; }
  .fecha-none { color:#bbb; font-size:12px; font-style:italic; }
  .empty-msg { text-align:center; color:#aaa; padding:32px 16px; font-style:italic; }
  .toast { font-size:12px; color:#166534; }
  .toast.err { color:#991b1b; }

  @media (min-width:700px) {
    .table-wrap { display:block; }
    .cards { display:none; }
    .toolbar input { min-width:160px; }
    .t-row select { min-width:150px; }
    .exportbar .lbl { width:auto; }
  }
  @media (max-width:420px) {
    .stats { grid-template-columns:repeat(2,1fr); }
    .grid2 { grid-template-columns:1fr; }
  }

  /* Vista Kanban */
  .view-toggle { display:flex; gap:3px; background:#ebebeb; border-radius:10px; padding:3px; margin-bottom:12px; }
  .vbtn { flex:1; padding:7px; border:none; border-radius:8px; font-size:13px; cursor:pointer; background:transparent; color:#888; font-weight:500; }
  .vbtn.active { background:#fff; color:#1a1a1a; box-shadow:0 1px 3px rgba(0,0,0,.12); font-weight:600; }
  .kanban-board { display:none; gap:12px; overflow-x:auto; padding-bottom:14px; -webkit-overflow-scrolling:touch; }
  .vista-kanban .table-wrap { display:none !important; }
  .vista-kanban #cards { display:none !important; }
  .vista-kanban .kanban-board { display:flex !important; }
  .kcol { flex:0 0 272px; background:#f0f0ee; border-radius:12px; padding:10px; display:flex; flex-direction:column; max-height:68vh; }
  .kcol-head { display:flex; justify-content:space-between; align-items:center; padding-bottom:8px; margin-bottom:6px; border-bottom:2px solid transparent; }
  .k-pend .kcol-head { border-color:#93c5fd; }
  .k-curso .kcol-head { border-color:#fcd34d; }
  .k-done .kcol-head { border-color:#6ee7b7; }
  .kcol-title { font-weight:700; font-size:13px; }
  .k-pend .kcol-title { color:#1e40af; }
  .k-curso .kcol-title { color:#92400e; }
  .k-done .kcol-title { color:#166534; }
  .kcol-cnt { font-size:11px; font-weight:700; padding:2px 8px; border-radius:20px; }
  .k-pend .kcol-cnt { background:#dbeafe; color:#1e40af; }
  .k-curso .kcol-cnt { background:#fef3c7; color:#92400e; }
  .k-done .kcol-cnt { background:#dcfce7; color:#166534; }
  .kcol-cards { display:flex; flex-direction:column; gap:7px; overflow-y:auto; flex:1; }
  .kcol.drag-over { background:#e8f0fe; outline:2px dashed #93c5fd; }
  .kcol-empty { text-align:center; color:#bbb; font-size:12px; font-style:italic; padding:18px 8px; }
  .kcard { background:#fff; border:1px solid #e5e5e5; border-radius:9px; padding:9px 11px; cursor:grab; }
  .kcard:active { cursor:grabbing; }
  .kcard.dragging { opacity:.35; }
  .kcard.k-venc { border-left:3px solid #f87171; }
  .kcard-name { font-weight:600; font-size:13px; margin-bottom:4px; }
  .kcard-tags { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:6px; }
  .kcard-foot { display:flex; justify-content:space-between; align-items:center; gap:6px; border-top:1px solid #f0f0f0; padding-top:6px; margin-top:2px; }
</style>
</head>
<body>
<div class="container">
  <h1>📋 Agenda Personal</h1>
  <div class="view-toggle">
    <button class="vbtn active" data-v="lista" onclick="setVista('lista')">📋 Lista</button>
    <button class="vbtn" data-v="kanban" onclick="setVista('kanban')">🗂 Kanban</button>
  </div>
  <div class="stats" id="stats"></div>

  <div class="toolbar">
    <input type="text" id="search" placeholder="🔍 Buscar tarea o responsable...">
    <div class="t-row">
      <select id="filtroEstado">
        <option value="">Todos los estados</option>
        <option value="pendiente">Pendiente</option>
        <option value="en-curso">En curso</option>
        <option value="completado">Completado</option>
        <option value="vencido">Vencido</option>
      </select>
      <select id="filtroImp">
        <option value="">Toda importancia</option>
        <option value="alta">Alta</option>
        <option value="media">Media</option>
        <option value="baja">Baja</option>
      </select>
      <select id="filtroResp"></select>
      <select id="filtroRecur">
        <option value="">Todas</option>
        <option value="si">Recurrentes</option>
        <option value="no">Únicas</option>
      </select>
    </div>
    <button class="btn primary" style="width:100%" onclick="abrirNueva()">+ Agregar tarea</button>
  </div>

  <div class="exportbar">
    <span class="lbl">Guardar / cargar:</span>
    <button class="btn" onclick="exportarJSON()">↓ JSON</button>
    <button class="btn" onclick="exportarExcel()">↓ Excel</button>
    <button class="btn" onclick="document.getElementById('fileInput').click()">↑ Importar JSON</button>
    <input type="file" id="fileInput" accept=".json" style="display:none" onchange="importarJSON(event)">
    <span id="toast" class="toast"></span>
  </div>

  <div id="formBox" style="display:none"></div>

  <!-- Tabla (desktop) -->
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th onclick="ordenarPor('nombre')">Tarea <span class="si" id="si-nombre">↕</span></th>
        <th onclick="ordenarPor('resp')"   id="th-resp">Responsable <span class="si">↕</span></th>
        <th onclick="ordenarPor('imp')"    id="th-imp">Importancia <span class="si">↕</span></th>
        <th onclick="ordenarPor('fecha')"  id="th-fecha">Vencimiento <span class="si">↕</span></th>
        <th onclick="ordenarPor('estado')" id="th-estado">Estado <span class="si">↕</span></th>
        <th>Recurrencia</th>
        <th>Acciones</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <!-- Cards (mobile) -->
  <div class="cards" id="cards"></div>

  <!-- Kanban board -->
  <div class="kanban-board" id="kanbanBoard"></div>
</div>

<script>
const STORAGE_KEY = "agenda_netlify_v1";

function cargar() {
  try { const d = localStorage.getItem(STORAGE_KEY); if (d) return JSON.parse(d); } catch(e) {}
  return { tareas: [], nextId: 1 };
}
function guardarLS() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({tareas,nextId})); } catch(e) {}
}

let {tareas,nextId} = cargar();
let editId=null, confirmId=null, sortCol=null, sortDir=1, vistaActual='lista', dragId=null;

const hoy = () => new Date().toISOString().slice(0,10);

function estadoEfectivo(t) {
  if (!t.fecha || t.estado==="completado") return t.estado;
  return t.fecha < hoy() ? "vencido" : t.estado;
}

function fmtFecha(f) {
  if (!f) return null;
  const [y,m,d]=f.split("-"); return d+"/"+m+"/"+y;
}

function diasEnMes(y,m){ return new Date(y,m+1,0).getDate(); }

function avanzar(t){
  const f=new Date(t.fecha+"T00:00:00");
  if (t.recur==="semanal") f.setDate(f.getDate()+7);
  else if (t.recur==="mensual"){ f.setMonth(f.getMonth()+1); if(t.dia) f.setDate(Math.min(t.dia,diasEnMes(f.getFullYear(),f.getMonth()))); }
  else if (t.recur==="anual") f.setFullYear(f.getFullYear()+1);
  t.fecha=f.toISOString().slice(0,10); t.estado="pendiente";
}

function iniciales(n){ if(!n)return"?"; const p=n.trim().split(/\s+/); return(p[0][0]+(p[1]?p[1][0]:"")).toUpperCase(); }

const IMP_ORD={alta:1,media:2,baja:3};
const EST_ORD={vencido:1,pendiente:2,"en-curso":3,completado:4};

function ordenarPor(col){
  if(sortCol===col) sortDir*=-1; else{sortCol=col;sortDir=1;}
  actualizarIconos(); renderLista();
}

function actualizarIconos(){
  ["nombre","resp","imp","fecha","estado"].forEach(c=>{
    const th=document.getElementById("th-"+c)||document.querySelector(`th[onclick="ordenarPor('${c}')"]`);
    if(!th)return;
    const si=th.querySelector(".si"); if(!si)return;
    if(c===sortCol){th.classList.add("active");si.textContent=sortDir===1?"↑":"↓";}
    else{th.classList.remove("active");si.textContent="↕";}
  });
}

function aplicarOrden(lista){
  if(!sortCol)return lista;
  return[...lista].sort((a,b)=>{
    let va,vb;
    if(sortCol==="nombre"){va=a.nombre.toLowerCase();vb=b.nombre.toLowerCase();}
    else if(sortCol==="resp"){va=(a.resp||"").toLowerCase();vb=(b.resp||"").toLowerCase();}
    else if(sortCol==="imp"){va=IMP_ORD[a.imp]||9;vb=IMP_ORD[b.imp]||9;}
    else if(sortCol==="fecha"){va=a.fecha||"9999";vb=b.fecha||"9999";}
    else if(sortCol==="estado"){va=EST_ORD[estadoEfectivo(a)]||9;vb=EST_ORD[estadoEfectivo(b)]||9;}
    if(va<vb)return-1*sortDir; if(va>vb)return 1*sortDir; return 0;
  });
}

function actualizarFiltroResp(){
  const sel=document.getElementById("filtroResp");
  const actual=sel.value;
  const nombres=[...new Set(tareas.map(t=>t.resp).filter(Boolean))].sort();
  sel.innerHTML='<option value="">Todos los responsables</option>'
    +nombres.map(n=>`<option value="${esc(n)}"${actual===n?" selected":""}>${esc(n)}</option>`).join("");
}

function render(){ guardarLS(); renderStats(); actualizarFiltroResp(); renderLista(); if(vistaActual==='kanban') renderKanban(); }

function setVista(v){
  vistaActual=v;
  document.querySelectorAll('.vbtn').forEach(b=>b.classList.toggle('active',b.dataset.v===v));
  document.querySelector('.container').classList.toggle('vista-kanban',v==='kanban');
  if(v==='kanban') renderKanban();
}

function renderKanban(){
  const lista=filtrar();
  const pend=lista.filter(t=>['pendiente','vencido'].includes(estadoEfectivo(t)));
  const curso=lista.filter(t=>estadoEfectivo(t)==='en-curso');
  const done=lista.filter(t=>estadoEfectivo(t)==='completado');
  const board=document.getElementById('kanbanBoard');
  board.innerHTML=kCol('pendiente','k-pend','Pendiente',pend)+kCol('en-curso','k-curso','En curso',curso)+kCol('completado','k-done','Completado',done);
  board.querySelectorAll('.kcard').forEach(card=>{
    card.addEventListener('dragstart',e=>{
      dragId=parseInt(card.dataset.id);
      setTimeout(()=>card.classList.add('dragging'),0);
      e.dataTransfer.effectAllowed='move';
    });
    card.addEventListener('dragend',()=>card.classList.remove('dragging'));
  });
  board.querySelectorAll('.kcol').forEach(col=>{
    col.addEventListener('dragover',e=>{e.preventDefault();col.classList.add('drag-over');});
    col.addEventListener('dragleave',e=>{if(!col.contains(e.relatedTarget))col.classList.remove('drag-over');});
    col.addEventListener('drop',e=>{
      e.preventDefault();col.classList.remove('drag-over');
      if(dragId==null)return;
      const nuevoEstado=col.dataset.estado;
      const t=tareas.find(x=>x.id===dragId);
      if(!t){dragId=null;return;}
      if(t.recur&&nuevoEstado==='completado') avanzar(t);
      else if(!t.recur) t.estado=nuevoEstado;
      dragId=null; render();
    });
  });
}

function kCol(estado,cls,titulo,items){
  return`<div class="kcol ${cls}" data-estado="${estado}">
    <div class="kcol-head"><span class="kcol-title">${titulo}</span><span class="kcol-cnt">${items.length}</span></div>
    <div class="kcol-cards">${items.length?items.map(t=>kCard(t)).join(''):'<div class="kcol-empty">Sin tareas</div>'}</div>
  </div>`;
}

function kCard(t){
  const ef=estadoEfectivo(t);
  const mover=!t.recur
    ?`<select onchange="cambiarEstado(${t.id},this.value)" style="font-size:11px;padding:3px 5px;border:1px solid #ddd;border-radius:6px;background:#fff;max-width:84px">
        <option value="" disabled selected>Mover...</option>
        <option value="pendiente">Pendiente</option>
        <option value="en-curso">En curso</option>
        <option value="completado">Completado</option>
       </select>`
    :`<button class="btn icon" style="color:#166534;font-size:13px;padding:2px 6px" onclick="completarRecur(${t.id})" title="Avanzar ciclo">✓</button>`;
  return`<div class="kcard${ef==='vencido'?' k-venc':''}" draggable="true" data-id="${t.id}">
    <div class="kcard-name">${esc(t.nombre)}</div>
    ${t.desc?`<div style="font-size:11px;color:#888;margin-bottom:5px">${esc(t.desc)}</div>`:''}
    <div class="kcard-tags">
      ${tagHtml(t.imp,t.imp.charAt(0).toUpperCase()+t.imp.slice(1))}
      ${ef==='vencido'?tagHtml('vencido','Vencido'):''}
      ${t.recur?tagHtml('recur',t.recur.charAt(0).toUpperCase()+t.recur.slice(1)):''}
    </div>
    <div class="kcard-foot">
      <div>${fechaHtml(t)}</div>
      <div style="display:flex;gap:3px;align-items:center">
        ${mover}
        ${t.resp?`<div class="avatar" title="${esc(t.resp)}">${iniciales(t.resp)}</div>`:''}
        <button class="btn icon" onclick="abrirEditar(${t.id})" title="Editar">✎</button>
        <button class="btn icon red" onclick="if(confirm('¿Eliminar?'))eliminar(${t.id})" title="Eliminar">✕</button>
      </div>
    </div>
  </div>`;
}

function renderStats(){
  const tot=tareas.length, pend=tareas.filter(t=>estadoEfectivo(t)==="pendiente").length,
        venc=tareas.filter(t=>estadoEfectivo(t)==="vencido").length, rec=tareas.filter(t=>t.recur).length;
  document.getElementById("stats").innerHTML=[
    ["Total",tot,"#1a1a1a"],["Pendientes",pend,"#1e40af"],
    ["Vencidas",venc,"#991b1b"],["Recurrentes",rec,"#5b21b6"]
  ].map(([l,v,c])=>`<div class="stat"><div class="lbl">${l}</div><div class="val" style="color:${c}">${v}</div></div>`).join("");
}

function filtrar(){
  const q=document.getElementById("search").value.toLowerCase();
  const fe=document.getElementById("filtroEstado").value;
  const fi=document.getElementById("filtroImp").value;
  const fr=document.getElementById("filtroRecur").value;
  const fresp=document.getElementById("filtroResp").value;
  return tareas.filter(t=>{
    const ef=estadoEfectivo(t);
    return(!q||t.nombre.toLowerCase().includes(q)||(t.desc||"").toLowerCase().includes(q)||(t.resp||"").toLowerCase().includes(q))
      &&(!fe||ef===fe)&&(!fi||t.imp===fi)
      &&(!fr||(fr==="si"?!!t.recur:!t.recur))
      &&(!fresp||t.resp===fresp);
  });
}

function tagHtml(tipo,label){ return`<span class="tag ${tipo}">${label}</span>`; }
function respHtml(resp){ return resp?`<div class="resp-cell"><div class="avatar">${iniciales(resp)}</div><span style="font-size:12px">${esc(resp)}</span></div>`:`<span style="font-size:12px;color:#bbb">—</span>`; }
function fechaHtml(t){ const fs=fmtFecha(t.fecha); const v=t.fecha&&t.fecha<hoy()&&t.estado!=="completado"; return fs?`<span class="${v?"fecha-warn":"fecha-ok"}">${fs}${v?" ⚠":""}</span>`:`<span class="fecha-none">Sin fecha</span>`; }
function efLabel(ef){ return ef==="en-curso"?"En curso":ef.charAt(0).toUpperCase()+ef.slice(1); }

function renderLista(){
  const lista=aplicarOrden(filtrar());
  const vacio=tareas.length===0?"Todavía no hay tareas. ¡Agregá la primera!":"No hay tareas que coincidan.";

  // Tabla desktop
  const tb=document.getElementById("tbody");
  if(!lista.length){ tb.innerHTML=`<tr><td colspan="7" class="empty-msg">${vacio}</td></tr>`; }
  else tb.innerHTML=lista.map(t=>{
    const ef=estadoEfectivo(t);
    const acc=confirmId===t.id
      ?`<div style="display:flex;gap:6px;align-items:center"><span style="font-size:11px;color:#666">¿Eliminar?</span><button class="btn danger-sm" onclick="eliminar(${t.id})">Sí</button><button class="btn cancel-sm" onclick="cancelConfirm()">No</button></div>`
      :`<div style="display:flex;gap:4px;align-items:center">
         ${!t.recur?`<select onchange="cambiarEstado(${t.id},this.value)" style="font-size:11px;padding:3px 6px;border:1px solid #ddd;border-radius:6px;background:#fff"><option value="" disabled selected>Estado</option><option value="pendiente">Pendiente</option><option value="en-curso">En curso</option><option value="completado">Completado</option></select>`:""}
         ${t.recur?`<button class="btn icon" style="color:#166534" title="Avanzar ciclo" onclick="completarRecur(${t.id})">✓</button>`:""}
         <button class="btn icon" onclick="abrirEditar(${t.id})">✎</button>
         <button class="btn icon red" onclick="pedirConfirm(${t.id})">✕</button>
       </div>`;
    return`<tr><td><div style="font-weight:600">${esc(t.nombre)}</div>${t.desc?`<div style="font-size:11px;color:#888;margin-top:2px">${esc(t.desc)}</div>`:""}</td>
      <td>${respHtml(t.resp)}</td>
      <td>${tagHtml(t.imp,t.imp.charAt(0).toUpperCase()+t.imp.slice(1))}</td>
      <td>${fechaHtml(t)}</td>
      <td>${tagHtml(ef,efLabel(ef))}</td>
      <td>${t.recur?tagHtml("recur",t.recur.charAt(0).toUpperCase()+t.recur.slice(1)):`<span style="color:#ccc">—</span>`}</td>
      <td>${acc}</td></tr>`;
  }).join("");

  // Cards mobile
  const cards=document.getElementById("cards");
  if(!lista.length){ cards.innerHTML=`<div class="empty-msg">${vacio}</div>`; return; }
  cards.innerHTML=lista.map(t=>{
    const ef=estadoEfectivo(t);
    const acc=confirmId===t.id
      ?`<div class="confirm-inline"><span>¿Eliminar?</span><button class="btn danger-sm" onclick="eliminar(${t.id})">Sí</button><button class="btn cancel-sm" onclick="cancelConfirm()">No</button></div>`
      :`<>
         ${!t.recur?`<select onchange="cambiarEstado(${t.id},this.value)" style="font-size:13px;padding:6px 8px;border:1px solid #ddd;border-radius:7px;background:#fff;flex:1"><option value="" disabled selected>Cambiar estado</option><option value="pendiente">Pendiente</option><option value="en-curso">En curso</option><option value="completado">Completado</option></select>`:""}
         ${t.recur?`<button class="btn icon" style="color:#166534;font-size:18px" onclick="completarRecur(${t.id})">✓</button>`:""}
         <button class="btn icon" onclick="abrirEditar(${t.id})">✎</button>
         <button class="btn icon red" onclick="pedirConfirm(${t.id})">✕</button>
       </>`;
    return`<div class="card">
      <div class="card-top">
        <div class="card-nombre">${esc(t.nombre)}</div>
        <div style="display:flex;gap:4px">
          <button class="btn icon" onclick="abrirEditar(${t.id})">✎</button>
          <button class="btn icon red" onclick="pedirConfirm(${t.id})">✕</button>
        </div>
      </div>
      ${t.desc?`<div class="card-desc">${esc(t.desc)}</div>`:""}
      <div class="card-meta">
        ${tagHtml(t.imp,t.imp.charAt(0).toUpperCase()+t.imp.slice(1))}
        ${tagHtml(ef,efLabel(ef))}
        ${t.recur?tagHtml("recur",t.recur.charAt(0).toUpperCase()+t.recur.slice(1)):""}
        ${fechaHtml(t)}
        ${t.resp?`<div class="resp-cell"><div class="avatar">${iniciales(t.resp)}</div><span style="font-size:12px">${esc(t.resp)}</span></div>`:""}
      </div>
      <div class="card-actions">
        ${confirmId===t.id
          ?`<div class="confirm-inline"><span>¿Eliminar?</span><button class="btn danger-sm" onclick="eliminar(${t.id})">Sí</button><button class="btn cancel-sm" onclick="cancelConfirm()">No</button></div>`
          :`${!t.recur?`<select onchange="cambiarEstado(${t.id},this.value)" style="font-size:13px;padding:7px 8px;border:1px solid #ddd;border-radius:7px;background:#fff;flex:1"><option value="" disabled selected>Cambiar estado...</option><option value="pendiente">Pendiente</option><option value="en-curso">En curso</option><option value="completado">Completado</option></select>`:""}
           ${t.recur?`<button class="btn" style="color:#166534;font-weight:600" onclick="completarRecur(${t.id})">✓ Completar y avanzar ciclo</button>`:""}`
        }
      </div>
    </div>`;
  }).join("");
}

function cambiarEstado(id,val){ if(!val)return; const t=tareas.find(x=>x.id===id); if(t)t.estado=val; render(); }
function completarRecur(id){ const t=tareas.find(x=>x.id===id); if(t)avanzar(t); render(); }
function pedirConfirm(id){ confirmId=id; renderLista(); }
function cancelConfirm(){ confirmId=null; renderLista(); }
function eliminar(id){ tareas=tareas.filter(t=>t.id!==id); confirmId=null; render(); }

function abrirNueva(){ editId=null; mostrarForm({nombre:"",desc:"",imp:"media",fecha:"",estado:"pendiente",recur:"",dia:"",resp:""}); }
function abrirEditar(id){ editId=id; const t=tareas.find(x=>x.id===id); mostrarForm({...t,dia:t.dia||"",recur:t.recur||"",resp:t.resp||""}); }

function mostrarForm(f){
  const em=f.recur==="mensual";
  const fb=document.getElementById("formBox");
  fb.style.display="";
  fb.innerHTML=`<div class="form-box">
    <h3>${editId?"Editar tarea":"Nueva tarea"}</h3>
    <div class="field"><label>Nombre *</label><input id="fNombre" value="${esc(f.nombre)}" placeholder="Ej: Pagar expensas"></div>
    <div class="field"><label>Responsable (opcional)</label><input id="fResp" value="${esc(f.resp)}" placeholder="Ej: Juan, Mamá, Yo..."></div>
    <div class="field"><label>Descripción (opcional)</label><textarea id="fDesc">${esc(f.desc)}</textarea></div>
    <div class="grid2">
      <div class="field"><label>Importancia</label><select id="fImp">
        <option value="alta"  ${f.imp==="alta" ?"selected":""}>Alta</option>
        <option value="media" ${f.imp==="media"?"selected":""}>Media</option>
        <option value="baja"  ${f.imp==="baja" ?"selected":""}>Baja</option>
      </select></div>
      <div class="field"><label>Estado</label><select id="fEstado">
        <option value="pendiente"  ${f.estado==="pendiente" ?"selected":""}>Pendiente</option>
        <option value="en-curso"   ${f.estado==="en-curso"  ?"selected":""}>En curso</option>
        <option value="completado" ${f.estado==="completado"?"selected":""}>Completado</option>
      </select></div>
    </div>
    <div class="sep"></div>
    <div class="field"><label>Recurrencia</label><select id="fRecur" onchange="actualizarFormRecur()">
      <option value=""        ${!f.recur           ?"selected":""}>Sin recurrencia</option>
      <option value="semanal" ${f.recur==="semanal"?"selected":""}>Semanal</option>
      <option value="mensual" ${f.recur==="mensual"?"selected":""}>Mensual</option>
      <option value="anual"   ${f.recur==="anual"  ?"selected":""}>Anual</option>
    </select></div>
    <div id="fechaWrap" class="${em?"grid2":""}">
      <div class="field"><label id="lblFecha">${f.recur?"Próxima fecha de venc.":"Fecha de vencimiento (opcional)"}</label>
        <input type="date" id="fFecha" value="${f.fecha}"></div>
      <div class="field" id="bloqDia" style="display:${em?"block":"none"}">
        <label>Día del mes</label><input type="number" id="fDia" min="1" max="31" value="${f.dia}" placeholder="Ej: 10">
      </div>
    </div>
    <div class="form-btns">
      <button class="btn" onclick="cerrarForm()">Cancelar</button>
      <button class="btn primary" onclick="guardarForm()">Guardar</button>
    </div>
  </div>`;
  fb.scrollIntoView({behavior:"smooth",block:"start"});
}

function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function actualizarFormRecur(){
  const r=document.getElementById("fRecur").value;
  document.getElementById("bloqDia").style.display=r==="mensual"?"block":"none";
  document.getElementById("lblFecha").textContent=r?"Próxima fecha de venc.":"Fecha de vencimiento (opcional)";
  document.getElementById("fechaWrap").className=r==="mensual"?"grid2":"";
}

function cerrarForm(){ document.getElementById("formBox").style.display="none"; editId=null; }

function guardarForm(){
  const nombre=document.getElementById("fNombre").value.trim();
  if(!nombre){alert("El nombre es obligatorio.");return;}
  const recur=document.getElementById("fRecur").value;
  const diaEl=document.getElementById("fDia");
  const obj={nombre,desc:document.getElementById("fDesc").value.trim(),
    imp:document.getElementById("fImp").value,fecha:document.getElementById("fFecha").value,
    estado:document.getElementById("fEstado").value,recur,
    dia:recur==="mensual"&&diaEl&&diaEl.value?parseInt(diaEl.value):null,
    resp:document.getElementById("fResp").value.trim()};
  if(editId) tareas=tareas.map(t=>t.id===editId?{...t,...obj}:t);
  else tareas.push({id:nextId++,...obj});
  cerrarForm(); render();
}

function descargar(contenido,nombre,mime){
  const a=document.createElement("a");
  a.href="data:"+mime+";charset=utf-8,"+encodeURIComponent(contenido);
  a.download=nombre; document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function exportarJSON(){ descargar(JSON.stringify({version:1,tareas},null,2),"agenda_personal.json","application/json"); }

function exportarExcel(){
  const cols=["Nombre","Descripción","Responsable","Importancia","Fecha vencimiento","Estado","Recurrencia","Día del mes"];
  const rows=tareas.map(t=>[t.nombre,t.desc,t.resp||"",t.imp,t.fecha?fmtFecha(t.fecha):"",estadoEfectivo(t),t.recur||"única",t.dia||""]);
  const e=s=>String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  const hRow="<Row ss:StyleID='h'>"+cols.map(c=>"<Cell ss:StyleID='h'><Data ss:Type='String'>"+e(c)+"</Data></Cell>").join("")+"</Row>";
  const dRows=rows.map(r=>"<Row>"+r.map(v=>"<Cell><Data ss:Type='String'>"+e(v)+"</Data></Cell>").join("")+"</Row>").join("");
  const xml="<?xml version='1.0' encoding='UTF-8'?><?mso-application progid='Excel.Sheet'?>"
    +"<Workbook xmlns='urn:schemas-microsoft-com:office:spreadsheet' xmlns:ss='urn:schemas-microsoft-com:office:spreadsheet'>"
    +"<Styles><Style ss:ID='h'><Font ss:Bold='1'/><Interior ss:Color='#DDEEFF' ss:Pattern='Solid'/></Style></Styles>"
    +"<Worksheet ss:Name='Pendientes'><Table>"+hRow+dRows+"</Table></Worksheet></Workbook>";
  descargar(xml,"agenda_personal.xls","application/vnd.ms-excel");
}

function importarJSON(e){
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      const lista=data.tareas||data;
      if(!Array.isArray(lista))throw new Error();
      tareas=lista.map(t=>({...t,resp:t.resp||""}));
      nextId=tareas.reduce((m,t)=>Math.max(m,t.id||0),0)+1;
      render(); toast("✓ Tareas importadas");
    }catch{ toast("⚠ Archivo no válido",true); }
  };
  reader.readAsText(file); e.target.value="";
}

function toast(msg,err=false){
  const el=document.getElementById("toast");
  el.textContent=msg; el.className="toast"+(err?" err":"");
  setTimeout(()=>{el.textContent="";},2500);
}

document.getElementById("search").addEventListener("input",renderLista);
document.getElementById("filtroEstado").addEventListener("change",renderLista);
document.getElementById("filtroImp").addEventListener("change",renderLista);
document.getElementById("filtroRecur").addEventListener("change",renderLista);
document.getElementById("filtroResp").addEventListener("change",renderLista);

render();
</script>
</body>
</html>
